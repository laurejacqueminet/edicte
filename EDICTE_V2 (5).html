<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚖️ COMPTAX — Classeur Comptable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS — CLASSEUR NOTARIAL
═══════════════════════════════════════════════════════════════ */
:root {
  --paper:   #FDFBF6;
  --paper2:  #F8F5EE;
  --paper3:  #F1EDE3;
  --rule:    #E8E2D5;
  --rule2:   #D4CBBA;
  --ink:     #1A1810;
  --ink2:    #3D3726;
  --ink3:    #6B6252;
  --ink4:    #A09888;

  --leather: #1A2744;
  --leather2:#243460;
  --spine:   #0E1629;
  --spine2:  #162038;

  --gold:    #C8A045;
  --gold2:   #E5BF6A;
  --gold3:   #F5D990;
  --gold-lt: #FBF5E0;

  --tab-ac:  #1A2744;   /* actes courants — marine */
  --tab-fam: #1A3D2B;   /* famille — vert forêt */
  --tab-div: #4A1942;   /* consultations — bordeaux */
  --tab-emp: #2D2D2D;   /* mode emploi — anthracite */
  --tab-ban: #0D3B4E;   /* gestion bancaire — teal */
  --tab-dash: #7A4F00;   /* tableau de bord — ambre */

  --blue:    #2358B8;
  --blue-lt: #EEF3FF;
  --green:   #1A5C35;
  --green-lt:#EDF7F1;
  --amber:   #8B5A00;
  --amber-lt:#FFF8E7;
  --red:     #8B1A1A;
  --red-lt:  #FEF2F2;
  --purple:  #5C1A8B;
  --purple-lt:#F5F0FF;

  --ring-sz: 34px;
  --tab-w:   42px;
  --spine-w: 68px;
  --page-bg: var(--paper);
  --ff:      'DM Sans', system-ui, sans-serif;
  --ff-serif:'Playfair Display', Georgia, serif;
  --ff-mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  font-family: var(--ff); font-size: 14px;
  color: var(--ink); -webkit-font-smoothing: antialiased;
}
input, button, select, textarea { font-family: var(--ff); font-size: 13px; }
button { cursor: pointer; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--paper3); }
::-webkit-scrollbar-thumb { background: var(--rule2); border-radius: 3px; }

/* ═══════════════════════════════════════════════════════════════
   DESK — background surface
═══════════════════════════════════════════════════════════════ */
body {
  background:
    radial-gradient(ellipse 140% 80% at 50% -10%, rgba(26,39,68,.15), transparent),
    linear-gradient(160deg, #2C2318 0%, #1A160F 40%, #0F0B07 100%);
}

/* ═══════════════════════════════════════════════════════════════
   BINDER SHELL
═══════════════════════════════════════════════════════════════ */
.binder {
  position: fixed; inset: 0;
  display: flex; align-items: stretch;
  padding: 18px 60px 18px 16px; /* right padding for tab protrusion */
  gap: 0;
}

/* ── SPINE ── */
.b-spine {
  width: var(--spine-w); flex-shrink: 0;
  background: linear-gradient(to right, var(--spine) 0%, var(--spine2) 40%, var(--leather) 100%);
  border-radius: 8px 0 0 8px;
  box-shadow:
    -4px 0 0 #06090F,
    -6px 4px 24px rgba(0,0,0,.5),
    inset -3px 0 8px rgba(0,0,0,.25),
    inset 2px 0 4px rgba(255,255,255,.03);
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 20px 0 16px;
  position: relative; z-index: 10;
}
.b-spine::after {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(to bottom,
    transparent,
    rgba(200,160,69,.2) 20%,
    rgba(200,160,69,.12) 80%,
    transparent);
}
.spine-brand {
  writing-mode: vertical-rl; text-orientation: mixed;
  transform: rotate(180deg);
  font-family: var(--ff-serif); font-size: 13px; font-weight: 600;
  color: rgba(200,160,69,.55); letter-spacing: .2em;
  text-transform: uppercase; user-select: none;
}
.spine-rings {
  display: flex; flex-direction: column;
  align-items: center; gap: 18px;
  flex: 1; justify-content: center;
}
.ring {
  width: var(--ring-sz); height: var(--ring-sz);
  border-radius: 50%;
  background:
    radial-gradient(circle at 32% 28%, var(--gold3) 0%, var(--gold2) 28%, var(--gold) 55%, #7A5A14 100%);
  box-shadow:
    0 3px 8px rgba(0,0,0,.5),
    inset 0 -2px 4px rgba(0,0,0,.35),
    inset 0 1px 2px rgba(255,255,255,.2);
  position: relative; flex-shrink: 0;
}
.ring::after {
  content: ''; position: absolute; inset: 7px; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #1A1208, #0A0705);
  box-shadow: inset 0 2px 5px rgba(0,0,0,.8);
}
.spine-year {
  font-family: var(--ff-mono); font-size: 9px;
  color: rgba(200,160,69,.3); letter-spacing: .1em;
}

/* ── COVER LEFT (decorative inner cover) ── */
.b-cover {
  width: 14px; flex-shrink: 0;
  background: linear-gradient(to right, var(--leather), var(--leather2));
  border-right: 1px solid rgba(200,160,69,.08);
}

/* ── INTERCALAIRES WRAPPER ── */
.b-body {
  flex: 1; display: flex; position: relative;
  background: var(--leather2);
  border-radius: 0 4px 4px 0;
  box-shadow: 4px 0 30px rgba(0,0,0,.3);
  overflow: visible; /* allow tabs to protrude */
  min-width: 0;
}

/* ── TAB DIVIDERS (protruding on right) ── */
.tabs-bottom {
  display: flex; flex-shrink: 0;
  border-top: 1px solid var(--rule2);
  overflow: hidden;
}
.tab-btn-h {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 7px; border: none; outline: none; cursor: pointer;
  padding: 9px 12px;
  border-right: 1px solid rgba(255,255,255,.08);
  transition: filter .15s ease;
  writing-mode: horizontal-tb;
}
.tab-btn-h:last-child { border-right: none; }
.tab-ico-h { font-size: 14px; }
.tab-lbl-h {
  font-size: 10.5px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: rgba(255,255,255,.6);
}
.tab-btn-h:hover { filter: brightness(1.15); }
.tab-btn-h.active { filter: brightness(1.2); }
.tab-btn-h.active .tab-lbl-h { color: #fff; }

/* ── PAGE AREA ── */
.b-page {
  flex: 1; overflow: hidden; display: flex; flex-direction: column;
  background: var(--paper2);
  position: relative;
}
/* paper edge lines */
.b-page::before {
  content: ''; position: absolute;
  left: 48px; top: 0; bottom: 0; width: 1px;
  background: rgba(200,160,69,.18); pointer-events: none; z-index: 1;
}
.b-page::after {
  content: ''; position: absolute;
  left: 56px; top: 0; bottom: 0; width: 1px;
  background: rgba(200,160,69,.08); pointer-events: none; z-index: 1;
}

/* Page header bar */
.page-header {
  height: 44px; flex-shrink: 0; display: flex; align-items: center;
  padding: 0 20px 0 68px; gap: 12px;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  box-shadow: 0 1px 4px rgba(26,24,16,.06);
  z-index: 2; position: relative;
}
.ph-logo {
  font-family: var(--ff-serif); font-size: 16px; font-weight: 700;
  color: var(--leather); letter-spacing: -.01em;
}
.ph-logo em { color: var(--gold); font-style: italic; }
.ph-section {
  font-size: 11px; font-weight: 600; color: var(--ink3);
  padding: 3px 10px; border-radius: 12px;
  background: var(--paper3); border: 1px solid var(--rule);
}
.ph-date {
  margin-left: auto;
  font-family: var(--ff-mono); font-size: 10px; color: var(--ink4);
}
.ph-back {
  background: none; border: 1px solid var(--rule); color: var(--ink3);
  border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 600;
  transition: all .14s;
}
.ph-back:hover { border-color: var(--rule2); color: var(--ink); }

/* Scrollable content */
.page-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 28px 24px 64px 68px;
}
.page-scroll::-webkit-scrollbar { width: 5px; }
.page-scroll::-webkit-scrollbar-thumb { background: var(--rule2); }

/* ═══════════════════════════════════════════════════════════════
   HOME — INTERCALAIRE INDEX
═══════════════════════════════════════════════════════════════ */
.home-eyebrow {
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
}
.home-title {
  font-family: var(--ff-serif); font-size: 32px; font-weight: 700;
  color: var(--leather); line-height: 1.05; margin-bottom: 6px;
  letter-spacing: -.01em;
}
.home-title em { color: var(--gold); font-style: italic; }
.home-sub { font-size: 13px; color: var(--ink3); margin-bottom: 28px; }

.section-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 26px 0 12px;
}
.sd-bar { height: 3px; width: 24px; border-radius: 2px; flex-shrink: 0; }
.sd-label {
  font-family: var(--ff-mono); font-size: 9.5px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; white-space: nowrap;
}
.sd-line { flex: 1; height: 1px; background: var(--rule); }

.acts-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 8px; margin-bottom: 4px;
}
.act-card {
  background: var(--paper); border: 1.5px solid var(--rule);
  border-radius: 8px; padding: 14px 16px;
  cursor: pointer; transition: all .18s ease;
  box-shadow: 0 1px 3px rgba(26,24,16,.05);
  position: relative; overflow: hidden;
}
.act-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--c, var(--leather)); opacity: 0; transition: opacity .18s;
}
.act-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(26,24,16,.1);
  border-color: var(--rule2);
}
.act-card:hover::before { opacity: 1; }
.ac-icon { font-size: 18px; margin-bottom: 7px; display: block; }
.ac-title { font-size: 12.5px; font-weight: 700; color: var(--ink); line-height: 1.4; margin-bottom: 2px; }
.ac-sub { font-size: 11px; color: var(--ink3); line-height: 1.45; }

/* ═══════════════════════════════════════════════════════════════
   FORM — FEUILLE A4
═══════════════════════════════════════════════════════════════ */
/* A4 paper effect */
.a4-sheet {
  background: var(--paper);
  border: 1px solid var(--rule2);
  border-radius: 3px 6px 6px 3px;
  box-shadow:
    2px 2px 0 var(--rule),
    4px 4px 0 var(--paper3),
    6px 6px 0 var(--rule),
    0 8px 32px rgba(26,24,16,.12);
  padding: 28px 32px 32px;
  margin-bottom: 20px;
  position: relative;
  /* paper texture lines */
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 27px,
      rgba(26,24,16,.028) 27px,
      rgba(26,24,16,.028) 28px
    );
}
.a4-sheet::before {
  content: '';
  position: absolute; top: 0; left: 0; bottom: 0; width: 4px;
  background: var(--c, var(--leather));
  border-radius: 3px 0 0 3px;
  opacity: .7;
  pointer-events: none;
}
.form-eyebrow {
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: .15em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
}
.form-title {
  font-family: var(--ff-serif); font-size: 24px; font-weight: 700;
  color: var(--leather); margin-bottom: 4px; letter-spacing: -.01em;
}
.form-sub {
  font-size: 12px; color: var(--ink3); margin-bottom: 20px;
  font-style: italic; line-height: 1.6;
}

/* Compact meta row */
.meta-row {
  display: flex; gap: 0;
  background: var(--paper); border: 1.5px solid var(--rule);
  border-radius: 6px; margin-bottom: 16px; overflow: hidden;
}
.mf {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 13px; border-right: 1px solid var(--rule); flex: 1;
}
.mf:last-child { border-right: none; }
.ml {
  font-family: var(--ff-mono); font-size: 9px; font-weight: 700;
  letter-spacing: .09em; text-transform: uppercase;
  color: var(--ink4); white-space: nowrap; flex-shrink: 0;
}
.mi {
  border: none; background: transparent; color: var(--ink);
  outline: none; width: 100%; font-size: 13px; font-family: var(--ff);
}
.mi::placeholder { color: var(--ink4); }
.mi:focus { color: var(--leather); }

/* Card section */
.card {
  background: var(--paper); border: 1.5px solid var(--rule);
  border-radius: 8px; margin-bottom: 12px; overflow: hidden;
  box-shadow: 0 1px 3px rgba(26,24,16,.04);
}
.card-hd {
  padding: 9px 16px;
  background: linear-gradient(to right, var(--paper2), var(--paper));
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; gap: 8px;
}
.card-stripe { width: 3px; height: 13px; border-radius: 2px; flex-shrink: 0; }
.card-title {
  font-family: var(--ff-mono); font-size: 9.5px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--ink2);
}
.card-bd { padding: 15px 17px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 0 18px; }

/* Field */
.f { margin-bottom: 13px; }
.f label {
  display: block; font-family: var(--ff-mono); font-size: 9px;
  font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
  color: var(--ink3); margin-bottom: 5px;
}
.f label .req { color: var(--red); }
.f input, .f select {
  width: 100%; padding: 8px 11px;
  border: 1.5px solid var(--rule); border-radius: 5px;
  background: var(--paper2); color: var(--ink); outline: none;
  font-size: 13px; transition: border-color .14s, background .14s;
}
.f input:focus, .f select:focus {
  border-color: var(--gold); background: var(--paper);
  box-shadow: 0 0 0 3px rgba(200,160,69,.12);
}

/* Phase banner */
.phase {
  border-radius: 6px; padding: 13px 16px; margin-bottom: 12px;
  border: 1.5px solid; border-left: 3px solid;
}
.ph-green  { background: var(--green-lt); border-color: #B2D8C0; border-left-color: var(--green); }
.ph-blue   { background: var(--blue-lt);  border-color: #BDD1F4; border-left-color: var(--blue); }
.ph-amber  { background: var(--amber-lt); border-color: #F5D88A; border-left-color: var(--amber); }
.ph-purple { background: var(--purple-lt);border-color: #D4C0F0; border-left-color: var(--purple); }
.ph-navy   { background: #EEF1FA;         border-color: #BCC8E8; border-left-color: var(--leather); }
.ph-title {
  font-family: var(--ff-mono); font-size: 9.5px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; margin-bottom: 11px;
}
.ph-green  .ph-title { color: var(--green); }
.ph-blue   .ph-title { color: var(--blue); }
.ph-amber  .ph-title { color: var(--amber); }
.ph-purple .ph-title { color: var(--purple); }
.ph-navy   .ph-title { color: var(--leather); }

/* Mode buttons */
.mode-row { display: flex; gap: 6px; margin: 8px 0 13px; flex-wrap: wrap; }
.mode-btn {
  flex: 1; min-width: 76px; padding: 8px 6px;
  border: 1.5px solid var(--rule); border-radius: 5px;
  background: var(--paper2); color: var(--ink3);
  font-size: 11.5px; font-weight: 600; text-align: center;
  transition: all .14s; cursor: pointer;
}
.mode-btn.on {
  border-color: var(--gold); background: var(--gold-lt);
  color: var(--amber); box-shadow: 0 0 0 3px rgba(200,160,69,.1);
}
.mode-icon { font-size: 15px; display: block; margin-bottom: 2px; }

/* Info boxes */
.ibox {
  border-radius: 5px; padding: 9px 13px; font-size: 12px;
  margin-bottom: 12px; line-height: 1.65; border-left: 3px solid;
}
.ib-blue  { background: var(--blue-lt);  border: 1px solid #BDD1F4; border-left: 3px solid var(--blue);  color: #1A3B8B; }
.ib-green { background: var(--green-lt); border: 1px solid #B2D8C0; border-left: 3px solid var(--green); color: #0D4020; }
.ib-amber { background: var(--amber-lt); border: 1px solid #F5D88A; border-left: 3px solid var(--amber); color: #5A3800; }
.ib-navy  { background: #EEF1FA;         border: 1px solid #BCC8E8; border-left: 3px solid var(--leather);color: var(--leather2); }
.ib-purple{ background: var(--purple-lt);border: 1px solid #D4C0F0; border-left: 3px solid var(--purple);color: #3A0A6B; }

/* Sub-lists */
.slist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.si {
  background: var(--paper2); border: 1.5px solid var(--rule);
  border-radius: 6px; padding: 11px 13px;
}
.si-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
.si-lbl {
  font-family: var(--ff-mono); font-size: 9px; font-weight: 700;
  letter-spacing: .09em; text-transform: uppercase; color: var(--ink3);
}
.btn-rm {
  background: none; border: none; color: var(--red); font-size: 17px;
  cursor: pointer; padding: 0 3px; line-height: 1; opacity: .7; transition: opacity .14s;
}
.btn-rm:hover { opacity: 1; }
.btn-add {
  background: var(--paper2); border: 1.5px solid var(--rule); color: var(--ink2);
  border-radius: 5px; padding: 5px 12px; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .14s;
}
.btn-add:hover { border-color: var(--gold); color: var(--amber); background: var(--gold-lt); }

/* Balance */
.balance {
  padding: 9px 13px; border-radius: 5px; font-size: 12px; font-weight: 500;
  margin-bottom: 12px; border: 1.5px solid var(--rule);
  background: var(--paper2); color: var(--ink3); display: flex; align-items: center; gap: 7px;
  transition: all .3s;
}
.balance.ok   { background: var(--green-lt); border-color: #B2D8C0; color: #0D4020; }
.balance.warn { background: var(--amber-lt); border-color: #F5D88A; color: #5A3800; animation: pulse-warn 2s infinite; }
@keyframes pulse-warn {
  0%, 100% { box-shadow: 0 0 0 0 rgba(200,160,69,.2); }
  50%       { box-shadow: 0 0 0 6px rgba(200,160,69,0); }
}

/* Action bar */
.action-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  padding-top: 20px; border-top: 1px solid var(--rule); margin-top: 20px;
}
.btn-gen {
  display: inline-flex; align-items: center; gap: 9px;
  background: linear-gradient(135deg, var(--leather) 0%, var(--leather2) 100%);
  color: #fff; border: 1px solid rgba(200,160,69,.3);
  border-radius: 8px; padding: 11px 24px;
  font-size: 13.5px; font-weight: 700;
  box-shadow: 0 4px 16px rgba(26,39,68,.3), inset 0 1px 0 rgba(255,255,255,.07);
  transition: all .2s ease; position: relative;
}
.btn-gen::before {
  content: ''; position: absolute; inset: 0; border-radius: 8px;
  background: linear-gradient(135deg, rgba(200,160,69,.15), transparent);
}
.btn-gen:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 22px rgba(26,39,68,.4);
}
.btn-reset {
  background: var(--paper2); border: 1.5px solid var(--rule); color: var(--ink3);
  border-radius: 8px; padding: 11px 18px; font-size: 13px; font-weight: 600;
  transition: all .14s;
}
.btn-reset:hover { border-color: var(--rule2); color: var(--ink); }

/* ── Détacher button (top of form) ── */
.btn-detach-form {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold-lt); border: 1.5px solid var(--gold2); color: var(--amber);
  border-radius: 7px; padding: 9px 18px;
  font-size: 12.5px; font-weight: 700; letter-spacing: .01em;
  transition: all .2s ease; position: relative; overflow: hidden;
  box-shadow: 0 2px 8px rgba(200,160,69,.15);
}
.btn-detach-form::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.3), transparent);
  pointer-events: none;
}
.btn-detach-form:hover {
  background: #F5E498; border-color: var(--gold);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(200,160,69,.25);
}
.detach-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
}
.detach-hint {
  font-family: var(--ff-mono); font-size: 9px; color: var(--ink4);
  letter-spacing: .06em; font-style: italic;
}

/* ═══════════════════════════════════════════════════════════════
   MODAL — FEUILLE RÉSULTAT DÉTACHABLE
═══════════════════════════════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,14,24,.65); backdrop-filter: blur(5px);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 20px; overflow-y: auto;
  animation: bdin .2s ease;
}
@keyframes bdin { from { opacity: 0; } to { opacity: 1; } }
.modal-sheet {
  width: 100%; max-width: 960px;
  background: var(--paper);
  border-radius: 4px 8px 8px 4px;
  box-shadow:
    3px 3px 0 var(--rule),
    6px 6px 0 var(--paper3),
    0 30px 80px rgba(0,0,0,.25);
  overflow: hidden;
  animation: mdin .3s cubic-bezier(.34,1.56,.64,1);
  background-image: repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(26,24,16,.025) 27px,rgba(26,24,16,.025) 28px);
  position: relative;
}
@keyframes mdin {
  from { opacity: 0; transform: translateY(-24px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-sheet::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
  background: var(--green); opacity: .8;
}
.modal-top {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--rule);
  background: linear-gradient(to right, var(--green-lt), var(--paper));
  display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
}
.modal-eyebrow {
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: .15em;
  text-transform: uppercase; color: var(--green); margin-bottom: 5px;
}
.modal-ref {
  font-family: var(--ff-serif); font-size: 22px; font-weight: 700;
  color: var(--leather); letter-spacing: -.01em; margin-bottom: 2px;
}
.modal-nom { font-size: 13px; color: var(--ink3); }
.modal-ts { font-family: var(--ff-mono); font-size: 10px; color: var(--ink4); margin-top: 2px; }
.modal-bal {
  display: inline-flex; align-items: center; gap: 7px; margin-top: 10px;
  padding: 7px 12px; border-radius: 5px; font-size: 12px; font-weight: 600;
}
.mbal-ok   { background: var(--green-lt); border: 1px solid #B2D8C0; color: #0D4020; }
.mbal-warn { background: var(--amber-lt); border: 1px solid #F5D88A; color: #5A3800; animation: pulse-warn 2s infinite; }
.modal-close {
  background: var(--paper2); border: 1.5px solid var(--rule); color: var(--ink3);
  border-radius: 50%; width: 34px; height: 34px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: all .14s;
}
.modal-close:hover { background: var(--red-lt); border-color: #F0A0A0; color: var(--red); }
.modal-acts {
  padding: 12px 28px; display: flex; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid var(--rule); background: var(--paper2);
}
.btn-detach {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--gold-lt); border: 1.5px solid var(--gold2); color: var(--amber);
  border-radius: 6px; padding: 8px 16px; font-size: 12.5px; font-weight: 600;
  transition: all .18s;
}
.btn-detach:hover { background: #F5E498; }
.btn-export-csv {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--green); color: #fff; border: none;
  border-radius: 6px; padding: 8px 16px; font-size: 12.5px; font-weight: 600;
  box-shadow: 0 3px 10px rgba(26,92,53,.25); transition: all .18s;
}
.btn-export-csv:hover { background: #0D4020; transform: translateY(-1px); }
.btn-modal-back {
  background: var(--paper); border: 1.5px solid var(--rule); color: var(--ink3);
  border-radius: 6px; padding: 8px 14px; font-size: 12.5px; font-weight: 600;
  transition: all .14s;
}
.btn-modal-back:hover { border-color: var(--rule2); color: var(--ink); }
.modal-body { padding: 22px 28px 28px; }

/* ── Écritures table ── */
.etbl-block { margin-bottom: 22px; }
.etbl-title {
  font-family: var(--ff-serif); font-size: 16px; font-weight: 700;
  color: var(--leather); margin-bottom: 2px; letter-spacing: -.01em;
}
.etbl-desc { font-family: var(--ff-mono); font-size: 10px; color: var(--ink3); margin-bottom: 9px; }
.etbl-wrap { overflow-x: auto; border-radius: 6px; border: 1.5px solid var(--rule); }
.etbl { width: 100%; border-collapse: collapse; min-width: 580px; }
.etbl thead { background: linear-gradient(to right, var(--leather), var(--leather2)); }
.etbl th {
  padding: 8px 10px; text-align: left;
  font-family: var(--ff-mono); font-size: 8.5px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.65);
  white-space: nowrap;
}
.etbl td { padding: 9px 10px; border-bottom: 1px solid var(--paper3); font-size: 12.5px; }
.etbl tr:last-child td { border-bottom: none; }
.etbl tr:nth-child(even) td { background: var(--paper2); }
.etbl .num { font-family: var(--ff-mono); text-align: right; font-weight: 700; font-size: 13px; color: var(--leather); }
.etbl .cpt { font-family: var(--ff-mono); font-size: 11px; color: var(--ink2); }
.etbl .lib { color: var(--ink3); font-size: 11.5px; font-style: italic; }
.jbadge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-family: var(--ff-mono); font-size: 9px; font-weight: 700; letter-spacing: .05em; }
.jb-R { background: #D4F7E5; color: #0D4020; border: 1px solid #B2D8C0; }
.jb-O { background: #D4E5F7; color: #1A3B8B; border: 1px solid #BDD1F4; }
.jb-T { background: #E8D4F7; color: #3A0A6B; border: 1px solid #D4C0F0; }

/* ── Checklist ── */
.cl-hd {
  font-family: var(--ff-mono); font-size: 9.5px; letter-spacing: .1em;
  text-transform: uppercase; color: var(--ink3); font-weight: 700;
  margin-bottom: 9px; display: flex; justify-content: space-between;
}
.cl-track { height: 4px; background: var(--rule); border-radius: 999px; overflow: hidden; margin-bottom: 11px; }
.cl-bar { height: 100%; background: var(--blue); border-radius: 999px; transition: width .35s ease; }
.cl-bar.done { background: var(--green); }
.cl-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 5px; cursor: pointer;
  margin-bottom: 4px; background: var(--paper); border: 1.5px solid var(--rule);
  transition: all .14s;
}
.cl-row:hover { background: var(--paper2); }
.cl-row.done { background: var(--green-lt); border-color: #B2D8C0; }
.cl-box {
  width: 17px; height: 17px; border-radius: 4px; flex-shrink: 0; margin-top: 2px;
  border: 1.5px solid var(--rule2); background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent; transition: all .14s;
}
.cl-row.done .cl-box { background: var(--green); border-color: var(--green); color: #fff; }
.cl-txt { font-size: 12px; color: var(--ink2); line-height: 1.5; }
.cl-row.done .cl-txt { text-decoration: line-through; color: #0D4020; }

/* ── Notaire synth ── */
.synth-card {
  background: var(--red-lt); border: 1.5px solid #F0A0A0; border-left: 3px solid var(--red);
  border-radius: 6px; padding: 14px 16px; margin-top: 18px;
}
.synth-title {
  font-family: var(--ff-mono); font-size: 9.5px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--red); font-weight: 700; margin-bottom: 11px;
}
.synth-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
.synth-item { background: #fff; border-radius: 5px; padding: 9px 11px; border: 1px solid #F0A0A0; }
.synth-lbl { font-family: var(--ff-mono); font-size: 9px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink3); margin-bottom: 3px; }
.synth-val { font-family: var(--ff-serif); font-size: 16px; font-weight: 700; color: var(--ink); }

/* ── Mode emploi ── */
.me-step {
  display: flex; gap: 14px; padding: 15px 17px;
  background: var(--paper); border: 1.5px solid var(--rule);
  border-radius: 8px; margin-bottom: 9px;
  box-shadow: 0 1px 3px rgba(26,24,16,.04);
}
.me-n {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-serif); font-size: 14px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, var(--leather), var(--leather2));
  box-shadow: 0 2px 6px rgba(26,39,68,.3);
}
.me-t { font-size: 13.5px; font-weight: 700; color: var(--leather); margin-bottom: 3px; }
.me-d { font-size: 12px; color: var(--ink3); line-height: 1.65; }
.rules-block {
  background: var(--paper); border: 1.5px solid var(--rule);
  border-radius: 8px; overflow: hidden; margin-top: 18px;
}
.rule-row {
  display: flex; gap: 10px; padding: 10px 14px;
  border-bottom: 1px solid var(--paper2); font-size: 12px;
}
.rule-row:last-child { border-bottom: none; }
.rule-ck { color: var(--green); font-weight: 800; flex-shrink: 0; margin-top: 1px; font-size: 14px; }
.rule-tx { color: var(--ink3); line-height: 1.55; }
.rule-tx strong { color: var(--ink); }

.ib-red   { background: var(--red-lt);   border: 1px solid #F0A0A0; border-left: 3px solid var(--red);   color: #5A0000; }
.ib-purple{ background: var(--purple-lt);border: 1px solid #D4C0F0; border-left: 3px solid var(--purple);color: #3A0A6B; }
/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--leather); color: #fff;
  padding: 11px 22px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 8px 30px rgba(0,0,0,.3);
  display: flex; align-items: center; gap: 9px; z-index: 999;
  opacity: 0; pointer-events: none;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  border: 1px solid rgba(200,160,69,.25);
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .binder { padding: 0 40px 0 0; gap: 0; }
  .b-spine { width: 48px; }
  .ring { width: 24px; height: 24px; }
  .ring::after { inset: 5px; }
  .b-cover { display: none; }
  .tab-btn { flex-direction: row; writing-mode: horizontal-tb; }
  .tab-btn .tab-lbl { transform: none; font-size: 8px; }
  .page-scroll { padding: 20px 16px 56px 60px; }
}
@media (max-width: 520px) {
  .tabs-rail { right: calc(-1 * var(--tab-w) + 4px); }
  .acts-grid { grid-template-columns: 1fr 1fr; }
  .grid { grid-template-columns: 1fr; }
  .meta-row { flex-direction: column; }
  .mf { border-right: none; border-bottom: 1px solid var(--rule); }
  .mf:last-child { border-bottom: none; }
  .action-bar { flex-direction: column; }
  .btn-gen, .btn-reset { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="binder">
  <!-- Spine with rings -->
  <div class="b-spine">
    <div class="spine-brand">COMPTAX</div>

    <div class="spine-year">Inot · Génapi</div>
  </div>
  <!-- Inner cover strip -->
  <div class="b-cover"></div>
  <!-- Body with tabs + page -->
  <div class="b-body">

    <!-- Page -->
    <div class="b-page">
      <div class="page-header" id="ph">
        <div class="ph-logo">COMPTAX</div>
        <div class="ph-section" id="ph-section">Tableau de bord</div>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
          <span class="ph-date" id="ph-date"></span>
        </div>
      </div>
      <div class="page-scroll" id="page-scroll"></div>
      <div class="tabs-bottom">
        <button class="tab-btn-h active" id="tab-dashboard" data-tab="dashboard" style="background:var(--tab-dash)">
          <span class="tab-ico-h">&#128197;</span><span class="tab-lbl-h">Tableau de bord</span>
        </button>
        <button class="tab-btn-h" id="tab-ventes" data-tab="ventes" style="background:#1A2744">
          <span class="tab-ico-h">&#127968;</span><span class="tab-lbl-h">Ventes</span>
        </button>
        <button class="tab-btn-h" id="tab-ssions" data-tab="ssions" style="background:#4A1942">
          <span class="tab-ico-h">&#128194;</span><span class="tab-lbl-h">Successions</span>
        </button>
        <button class="tab-btn-h" id="tab-banque" data-tab="banque" style="background:var(--tab-ban)">
          <span class="tab-ico-h">&#127970;</span><span class="tab-lbl-h">Mouvements comptables</span>
        </button>
        <button class="tab-btn-h" id="tab-tarif" data-tab="tarif" style="background:#7A1F1F">
          <span class="tab-ico-h">&#9878;&#65039;</span><span class="tab-lbl-h">Frais &amp; taxe</span>
        </button>
        <button class="tab-btn-h" id="tab-inot" data-tab="inot" style="background:#1A4D2B">
          <span class="tab-ico-h">&#128268;</span><span class="tab-lbl-h">Connexion Inot</span>
        </button>
      </div>
    </div>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"><span id="toast-icon"></span><span id="toast-msg"></span></div>

<script>
'use strict';

/* ── UTILS ─────────────────────────────────────────────────────── */
const today = () => new Date().toISOString().split('T')[0];
const todayFR = () => new Date().toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
const fmt = n => {
  const x = Number(n);
  if (isNaN(x) || n === '' || n == null) return '—';
  return x.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '\u202f€';
};
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const modeLib = m => ({'virement':'Par virement instantané','cb':'Par CB','cheque':'Par chèque'}[m]||'Par virement');
const $ = id => document.getElementById(id);
const val = id => $('f-'+id)?.value?.trim()??'';
const num = id => parseFloat(val(id))||0;
const jBadge = j => {
  const c = j==='RECETTES'?'jb-R':j==='OD'?'jb-O':'jb-T';
  return `<span class="jbadge ${c}">${esc(j)}</span>`;
};
const toast = (msg, icon='✓', ms=2800) => {
  $('toast-icon').textContent = icon;
  $('toast-msg').textContent = msg;
  const t = $('toast');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), ms);
};
const computeBalance = ecritures => {
  let d=0,c=0;
  ecritures?.forEach(ec => ec.rows?.forEach(r => {
    const m = parseFloat(r.montant)||0;
    if(r.debit) d+=m; if(r.credit) c+=m;
  }));
  return { deb:d, cred:c, diff:Math.abs(d-c) };
};

/* ── STATE ─────────────────────────────────────────────────────── */
const S = { tab:'dashboard', actId:null, subs:{}, dash:null };

/* ── BUILD RINGS ────────────────────────────────────────────────── */
$('ph-date').textContent = todayFR();

/* ── NAV DATA ───────────────────────────────────────────────────── */
const TABS = {
  dashboard: { label:'Tableau de bord',       color:'#7A4F00' },
  ventes:    { label:'Ventes',                 color:'#1A2744' },
  ssions:    { label:'Successions',            color:'#4A1942' },
  banque:    { label:'Mouvements comptables',  color:'#0D3B4E' },
  tarif:     { label:'Frais &amp; taxe',       color:'#7A1F1F' },
  inot:      { label:'Connexion Inot',         color:'#1A4D2B' },
};

/* ── NAVIGATION VENTES (4 sous-parties) ── */
const NAV_VENTES = {
  avantcontrat: [
    {id:'compromis',     label:'Compromis de vente',  sub:'D\u00e9p\u00f4t de garantie re\u00e7u et mis en s\u00e9questre',icon:'\ud83d\udcb0',c:'#4A235A'},
    {id:'promesse_cas1', label:'Promesse \u2014 Cas 1', sub:'Notaire des 2 parties \u2014 provision + s\u00e9questre chez nous',icon:'\ud83e\udd1d',c:'#1B4F72'},
    {id:'promesse_cas2', label:'Promesse \u2014 Cas 2', sub:'Notaire acqu\u00e9reur \u2014 promesse \u00e0 l\u2019\u00c9tude, indemn. chez notaire vendeur',icon:'\ud83c\udfe0',c:'#154360'},
    {id:'promesse_cas3', label:'Promesse \u2014 Cas 3', sub:'Notaire acqu\u00e9reur \u2014 promesse chez le vendeur, virements',icon:'\ud83d\udd11',c:'#1A5276'},
    {id:'promesse_cas4', label:'Promesse \u2014 Cas 4', sub:'Notaire vendeur \u2014 re\u00e7oit indemn. et la met en s\u00e9questre',icon:'\ud83d\udccb',c:'#1F618D'},
  ],
  ventes: [
    {id:'vente_cas1', label:'Vente \u2014 Cas 1', sub:'Notaire des 2 parties \u2014 tous les fonds',icon:'\ud83c\udfe1',c:'#7D6608'},
    {id:'vente_cas2', label:'Vente \u2014 Cas 2', sub:'Notaire acqu\u00e9reur \u2014 fonds re\u00e7us, vir\u00e9s au notaire vendeur',icon:'\ud83c\udfd7\ufe0f',c:'#6E2F00'},
    {id:'vente_cas3', label:'Vente \u2014 Cas 3', sub:'Notaire vendeur \u2014 fonds re\u00e7us du notaire acqu\u00e9reur',icon:'\ud83d\udcdc',c:'#641E16'},
    {id:'vente_cas4', label:'Vente \u2014 Cas 4', sub:'Notaire vendeur \u2014 fonds re\u00e7us directement de l\u2019acqu\u00e9reur',icon:'\ud83c\udfe0',c:'#922B21'},
  ],
  licitations: [
    {id:'licitation', label:'Licitation', sub:'Vente bien indivis \u2014 PAR VIRT EN VUE LICITATION',icon:'\ud83c\udfd9\ufe0f',c:'#5B21B6'},
  ],
  prets: [
    {id:'pret', label:'Pr\u00eat notari\u00e9', sub:'PAR VIRT EN VUE ACQUISITION A REALISER',icon:'\ud83c\udfe6',c:'#0F766E'},
  ],
};

/* ── NAVIGATION SUCCESSIONS (3 sous-parties) ── */
const NAV_SSIONS = {
  recus: [
    {id:'ssion_prov',     label:'Provision sur frais',            sub:'Ouverture dossier \u2014 PAR VIRT PROVISION SUR FRAIS',icon:'\ud83d\udce5',c:'#4A1942'},
    {id:'ssion_cloture',  label:'Cl\u00f4ture compte bancaire d\u00e9funt', sub:'PAR VIRT CLOTURE COMPTE PR LA SSION DE\u2026',icon:'\ud83c\udfe6',c:'#5A2050'},
    {id:'ssion_retraite', label:'Rembt proratas retraite',         sub:'PAR VIRT REMBT PRORATAS RETRAITE POUR LA SSION DE\u2026',icon:'\ud83d\udcb0',c:'#6A2560'},
    {id:'ssion_rembt',    label:'Rembt mutuelle / CPAM / imp\u00f4ts', sub:'PAR VIRT REMBT POUR LA SSION DE\u2026',icon:'\ud83d\udd04',c:'#7A2A6F'},
    {id:'ssion_droits',   label:'Provision droits de succession',  sub:'Versement h\u00e9ritiers \u2014 PAR VIRT PROVISION SUR FRAIS',icon:'\u2696\ufe0f',c:'#5C1A8B'},
  ],
  od: [
    {id:'ssion_od_droits', label:'Droits succession \u2192 Tr\u00e9sor',     sub:'OD SUCCESSION \u2192 44220000 \u2014 VIRT DROITS DE SSION',icon:'\ud83c\udfd9\ufe0f',c:'#4A1942'},
    {id:'ssion_od_herit',  label:'Fonds disponibles \u2192 h\u00e9ritier unique', sub:'VIRT DISPO FONDS SSION',icon:'\ud83d\udc64',c:'#5A2050'},
    {id:'ssion_od_qp',     label:'Quote-part fonds \u2192 h\u00e9ritier',     sub:'VIRT QP DISPO FONDS DE SSION',icon:'\ud83d\udcca',c:'#6A2560'},
    {id:'ssion_od_cdc',    label:'Int\u00e9r\u00eats CDC \u2192 succession',   sub:'VIRT INTERETS CDC AU COMPTE &CONTREPARTIE',icon:'\ud83d\udcc8',c:'#7A2A6F'},
  ],
  repartition: [
    {id:'repartition_ssion', label:'Compte de r\u00e9partition', sub:'Calculateur \u2014 D\u00e9ductions + OD h\u00e9ritiers',icon:'\ud83d\udccb',c:'#4A1942'},
  ],
};

const ALL_VENTES = [...NAV_VENTES.avantcontrat,...NAV_VENTES.ventes,...NAV_VENTES.licitations,...NAV_VENTES.prets];
const ALL_SSIONS = [...NAV_SSIONS.recus,...NAV_SSIONS.od,...NAV_SSIONS.repartition];
const ALL_ACTS = [...ALL_VENTES,...ALL_SSIONS];
const ACTES = Object.fromEntries(ALL_ACTS.map(a=>[a.id,a]));


/* ── RENDER ─────────────────────────────────────────────────────── */
const setPhSection = () => {
  const acte = S.actId ? ACTES[S.actId] : null;
  $('ph-section').textContent = acte ? acte.label : TABS[S.tab]?.label || '';
  const backBar = $('ph-back-wrap');
  if(backBar) backBar.style.display = acte ? 'flex' : 'none';
};

const navigate = (tab, actId=null) => {
  S.tab = tab; S.actId = actId; S.subs = {};
  document.querySelectorAll('.tab-btn-h').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  setPhSection();
  renderPage();
};

const renderPage = () => {
  const ps = $('page-scroll'); ps.innerHTML = '';
  if(S.actId) { ps.innerHTML = buildForm(S.actId); bindForm(); return; }
  if(S.tab==='dashboard') { ps.innerHTML = buildDashboard(); return; }
  if(S.tab==='tarif') { ps.innerHTML = buildTarif(); return; }
  if(S.tab==='inot') { ps.innerHTML = buildConnexionInot(); return; }
  if(S.tab==='banque'&&!S.actId){ps.innerHTML=buildBanque();return;}
  if((S.tab==='ventes'||S.tab==='ssions')&&!S.actId){ps.innerHTML=buildHome(S.tab);return;}
  ps.innerHTML = buildHome(S.tab);
};

/* ── HOME ───────────────────────────────────────────────────────── */
const buildSectionGroup = (label, color, items) => `

const onKeyGen = e => {
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'&&S.actId) handleGenerate();
};

/* ── PAYLOAD BUILDER ── */
const buildPayload = () => {
  const id = S.actId;
  const p = {actId:id, ref:val('ref'), date:val('date')};
  const d2 = $('f-date2');
  if(d2) p.date2 = d2.value;
  // Collect all form field values
  document.querySelectorAll('[id^="f-"]').forEach(el=>{
    const k = el.id.slice(2);
    if(k!=='mode') p[k] = el.value?.trim();
  });
  // Collect sub-lists
  ['don','her','coind','plvt'].forEach(lid=>{
    if(S.subs[lid]) p[lid+'_items'] = (S.subs[lid]||[]).map((_,i)=>{
      const m = {};
      ['nom','cpt','montant','qp','m','mt','on'].forEach(f=>{
        const el = $(`f-${lid}-${i}-${f}`);
        if(el) m[f] = el.value?.trim();
      });
      return m;
    });
  });
  return p;
};

/* ── GENERATE ── */
let _lastResult = null, _ckDone = 0, _ckTotal = 0;

const handleGenerate = () => {
  const p = buildPayload();
  const fn = COMPUTES[p.actId];
  if(!fn) { toast('Acte non pris en charge', '⚠️'); return; }
  const result = fn(p);
  if(!result) return;
  _lastResult = result;
  _ckDone = 0;
  _ckTotal = (result.checks||[]).filter(Boolean).length;
  showModal(result);
  toast('Écritures générées', '✓');
};

/* ── EXPORTS ── */
const exportCSV = () => {
  if(_lastResult&&_lastResult._isDivers){exportInotCSV();return;}
  if(!_lastResult) return;
  let csv = '\uFEFFJournal;Date;Compte_Debit;Compte_Credit;Montant;Libelle\r\n';
  (_lastResult.ecritures||[]).forEach(ec=>(ec.rows||[]).forEach(r=>{
    const m = String(r.montant||'').replace('.',',');
    const lib = String(r.libelle||'').replace(/"/g,"'");
    csv += `${r.journal};${r.date};${r.debit};${r.credit};${m};"${lib}"\r\n`;
  }));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`NC_${(_lastResult.ref||'dossier').replace(/\s/g,'_')}_${today()}.csv`;
  a.click();
  toast('CSV exporté pour Inot Compta','⬇️');
};

document.addEventListener('click', e => {
  const el = e.target.closest('[data-a]');
  if(!el) return;
  const a = el.dataset.a;
  const t = el.dataset.t;
  const m = el.dataset.m;
  const id = el.dataset.id;
  const l = el.dataset.l;
  const idx = el.dataset.i;

  if(a==='tab'||el.classList.contains('tab-btn')) {
    const nt = el.dataset.tab;
    if(nt) navigate(nt);
    return;
  }
  if(a==='act'||a==='goto') { navigate(S.tab, id); return; }
  if(a==='back')    { navigate(S.tab); return; }

    const mi=$('f-bqmode'); if(mi) mi.value=m;
    if(typeof bqUpdateLib==='function') bqUpdateLib();
    return;
  }
  if(a==='bqDcnGen'){
    const res=computeBanqueDcn(); if(!res){toast('Remplissez les champs obligatoires','\u26a0\ufe0f');return;}
    _lastResult=res; _ckDone=0; _ckTotal=(res.checks||[]).filter(Boolean).length; showModal(res); toast('\u00c9critures g\u00e9n\u00e9r\u00e9es','\u2713'); return;
  }
  if(a==='bqOffGen'){
    const res=computeBanqueOff(); if(!res){toast('Remplissez les champs obligatoires','\u26a0\ufe0f');return;}
    _lastResult=res; _ckDone=0; _ckTotal=(res.checks||[]).filter(Boolean).length; showModal(res); toast('\u00c9critures g\u00e9n\u00e9r\u00e9es','\u2713'); return;
  }
  if(a==='bqDcnMvt'){ const res=computeBanqueDcn(); if(res){_lastResult=res; exportHTML();} return; }
  if(a==='bqOffMvt'){ const res=computeBanqueOff(); if(res){_lastResult=res; exportHTML();} return; }

    const res=computeBanqueOff('virt'); if(!res) return;

      +'<style>'+css2+'html,body{overflow:auto!important;height:auto!important}body{background:var(--paper2);padding:20px;font-family:var(--ff)}@media print{body{background:#fff;padding:0}.noprint{display:none}}</style>'

document.addEventListener('input', e=>{
  const d = e.target.dataset.derive;
  if(!d) return;
  if(d==='consult-ht'){
    const ttc=parseFloat(e.target.value)||180;
    const ht=$('ht-display'); if(ht) ht.textContent=`HT : ${fmt(ttc/1.2)} \u00b7 TVA 20% : ${fmt(ttc/6)}`;
  }

    const items=S.subs['don']||[];
    const tot=items.reduce((_,__,i)=>_+(parseFloat($('f-don-'+i+'-m')?.value)||0),0);
    const att=parseFloat($('f-montant')?.value)||0;

    el.className=`balance${ok?' ok':att>0?' warn':''}`;
    el.textContent=ok?`\u2705 Contr\u00f4le OK \u2014 Total = ${fmt(att)}`:att>0?`\u26a0\ufe0f \u00c9cart : ${fmt(tot)} saisis / ${fmt(att)} attendus`:'Renseignez le montant total de la donation';

});

      <div class="f"><label>Montant dépôt (€) <span class="req">*</span></label><input id="f-depot" type="number"></div>

    </div>
    <div class="ibox ib-amber">OD libellé débit : <strong>VIRT DEPOT DE GARANTIE AU COMPTE &amp;CONTREPARTIE</strong><br>OD libellé crédit : <strong>VIRT DEPOT DE GARANTIE DU COMPTE &amp;CONTREPARTIE</strong></div>
  </div>
  ${actionHTML()}`;

COMPUTES['compromis'] = p => {
  const acq=p.nomacq||'Acquéreur', ml=modeLib(p.mode||'virement');
  const prov=parseFloat(p.provision)||0, dep=p.depot||'';
  const cptSeq=p.cptseq||'SEQ', cptAcq=p.cptacq||'';
  const dateComp=p.date||today(), dateRec=p.date2||p.date;
  const credit=`${acq}${cptAcq?' — cpt '+cptAcq:''}`;
  const ecritures=[];
  if(prov>0) ecritures.push({titre:'📅 PHASE 1 — Provision sur frais',description:`Journal RECETTES — ${ml}`,rows:[{journal:'RECETTES',date:dateComp,debit:'54210000 (DCN)',credit,montant:String(prov),libelle:`RECU PAR VIRT PROVISION SUR FRAIS — ${acq}`}]});
  ecritures.push({titre:'📅 PHASE 2 — Réception dépôt + mise en Séquestre',description:'RECETTES (réception) + OD (mise en séquestre)',rows:[
    {journal:'RECETTES',date:dateRec,debit:'54210000 (DCN)',credit,montant:dep,libelle:`RECU PAR VIRT DEPOT DE GARANTIE`},
    {journal:'OD',date:dateRec,debit:`${acq}${cptAcq?' — cpt '+cptAcq:''}`,credit:`Séquestre — cpt ${cptSeq}`,montant:dep,libelle:`VIRT DEPOT DE GARANTIE AU COMPTE ${cptSeq} — ${p.ref||''}`},
  ]});
  return {ref:p.ref,nom:acq,ecritures,checks:[
    'Compte acquéreur créé dans Inot Compta + compte séquestre',
    'Journée comptable ouverte',
    prov>0?`✅ Saisir RECETTES — ${ml} provision ${fmt(prov)} — libellé : RECU PAR VIRT PROVISION SUR FRAIS`:'',
    '📌 Taxe (émoluments compromis) : à saisir par le comptable à son retour',
    `✅ Saisir RECETTES — dépôt garantie — libellé : RECU PAR VIRT DEPOT DE GARANTIE`,
    `✅ OD — débit ${acq} / crédit Séquestre — libellé : VIRT DEPOT DE GARANTIE AU COMPTE &CONTREPARTIE`,
    `✅ Contrôle : compte séquestre = ${fmt(dep)}`,
    '📌 Le séquestre sera libéré à la vente',
  ]};
};

/* ── PROMESSES (toutes corrections) ── */
const PRMDESC={
  promesse_cas1:'Étude notaire des deux parties. Créer : compte acquéreur, compte vendeur, compte séquestre.',
  promesse_cas2:'L\'Étude est Notaire de l\'acquéreur — La promesse est signée à l\'Étude — L\'indemnité d\'immobilisation est séquestrée chez le notaire du vendeur.',
  promesse_cas3:'L\'Étude est Notaire de l\'acquéreur — La promesse est signée chez le vendeur — Virements vers le notaire vendeur.',
  promesse_cas4:'L\'Étude est Notaire vendeur — L\'acte est signé chez le notaire du vendeur.',
};
['cas1','cas2','cas3','cas4'].forEach(cas=>{
  const id=`promesse_${cas}`;
  FORMS[id]=()=>`
    ${cas!=='cas4'?metaHTML([{l:'Récep. indemnité',id:'date2',t:'date',v:today()}]):metaHTML()}
    <div class="ibox ib-blue">${esc(PRMDESC[id])}</div>
    ${cas==='cas2'||cas==='cas3'?'<div class="ibox ib-green">ℹ️ Pas de N° de compte tiers notaire vendeur à saisir — la base RIB Inot référence tous les notaires de France automatiquement.</div>':''}
    ${cardHTML('Parties','#1B4F72',`
      <div class="grid">
        <div class="f"><label>Nom acquéreur <span class="req">*</span></label><input id="f-nomacq" type="text" placeholder="ex : M. et Mme MARTIN"></div>
        <div class="f"><label>N° compte acquéreur Inot</label><input id="f-cptacq" type="text" placeholder="ex : 200"></div>
        ${cas==='cas1'?`
          <div class="f"><label>Nom vendeur</label><input id="f-nomvend" type="text" placeholder="ex : SCI LES ORMES"></div>
          <div class="f"><label>N° compte vendeur Inot</label><input id="f-cptvend" type="text" placeholder="ex : 300"></div>
          <div class="f"><label>N° compte séquestre</label><input id="f-cptseq" type="text" placeholder="ex : SEQ-2026-0342"></div>`:''}
        ${cas==='cas2'||cas==='cas3'?`<div class="f"><label>Nom notaire vendeur</label><input id="f-nomnv" type="text" placeholder="ex : Me DUBOIS"></div>`:''}
        ${cas==='cas4'?`
          <div class="f"><label>Nom vendeur</label><input id="f-nomvend" type="text" placeholder="ex : SCI LES ORMES"></div>
          <div class="f"><label>N° compte séquestre</label><input id="f-cptseq" type="text" placeholder="ex : SEQ-2026-0342"></div>`:''}
      </div>`)}
    ${cas!=='cas4'?`
      <div class="phase ph-green">
        <div class="ph-title">Phase 1 · Provision sur frais (Jour J)</div>
        <div class="ibox ib-green">Libellé RECETTES : <strong>RECU PAR VIRT PROVISION SUR FRAIS</strong></div>
        <div class="grid">
          <div class="f"><label>Montant provision (€)</label><input id="f-provision" type="number" value="500"></div>
        </div>
        ${modesHTML()}
      </div>`:''}
    <div class="phase ph-blue">
      <div class="ph-title">Phase ${cas==='cas4'?'1':'2'} · Réception indemnité d'immobilisation</div>
      <div class="ibox ib-blue">Libellé RECETTES : <strong>RECU PAR VIRT INDEMNITE IMMOBILISATION</strong>${cas==='cas2'?`<br>Libellé virt notaire vendeur : <strong>VIRT INDEMNITE IMMOBILISATION [réf affaire]</strong>`:cas==='cas3'?`<br>Libellé virt provision : <strong>VIRT PROVISION SUR FRAIS [réf affaire]</strong><br>Libellé virt indemnité : <strong>VIRT INDEMNITE IMMOBILISATION [réf affaire]</strong>`:''}</div>
      <div class="grid">
        <div class="f"><label>Montant indemnité (€) <span class="req">*</span></label><input id="f-indemnite" type="number"></div>
      </div>
    </div>
    ${actionHTML()}`;

  COMPUTES[id]=p=>{
    const acq=p.nomacq||'Acquéreur', vend=p.nomvend||'Vendeur', nv=p.nomnv||'Notaire vendeur';
    const cptAcq=p.cptacq||'', cptVend=p.cptvend||'', cptSeq=p.cptseq||'SEQ';
    const ml=modeLib(p.mode||'virement');
    const prov=parseFloat(p.provision)||0, ind=p.indemnite||'';
    const dateSig=p.date||today(), dateInd=p.date2||p.date;
    const creditAcq=`${acq}${cptAcq?' — cpt '+cptAcq:''}`;
    const ecritures=[], checks=[];

    if(cas!=='cas4'&&prov>0){
      ecritures.push({titre:'📅 PHASE 1 — Provision sur frais',description:`Journal RECETTES — ${ml}`,rows:[{journal:'RECETTES',date:dateSig,debit:'54210000 (DCN)',credit:creditAcq,montant:String(prov),libelle:`RECU PAR VIRT PROVISION SUR FRAIS`}]});
      checks.push(`✅ PHASE 1 : RECETTES — ${ml} provision ${fmt(prov)} — RECU PAR VIRT PROVISION SUR FRAIS`);
    }
    if(cas==='cas1'){
      ecritures.push({titre:'📅 PHASE 2 — Réception indemnité (3 étapes)',description:'RECETTES · OD acq→vend · OD vend→séquestre',rows:[
        {journal:'RECETTES',date:dateInd,debit:'54210000 (DCN)',credit:creditAcq,montant:ind,libelle:'RECU PAR VIRT INDEMNITE IMMOBILISATION'},
        {journal:'OD',date:dateInd,debit:creditAcq,credit:`${vend}${cptVend?' — cpt '+cptVend:''}`,montant:ind,libelle:`VIRT INDEMNITE IMMOBILISATION AU COMPTE &CONTREPARTIE`},
        {journal:'OD',date:dateInd,debit:`${vend}${cptVend?' — cpt '+cptVend:''}`,credit:`Séquestre — cpt ${cptSeq}`,montant:ind,libelle:`VIRT INDEMNITE IMMOBILISATION DU COMPTE &CONTREPARTIE`},
      ]});
      checks.push(`✅ PHASE 2 : RECETTES indemnité ${fmt(ind)} — RECU PAR VIRT INDEMNITE IMMOBILISATION`,`✅ OD Étape 2 : ${acq} → ${vend} — libellé AU/DU COMPTE &CONTREPARTIE`,`✅ OD Étape 3 : ${vend} → Séquestre ${cptSeq}`,`✅ Contrôle : ${vend} soldé · Séquestre = ${fmt(ind)}`);
    } else if(cas==='cas2'){
      ecritures.push({titre:'📅 PHASE 2 — Réception indemnité + virement notaire vendeur',description:'RECETTES · OD acq→notaire vendeur',rows:[
        {journal:'RECETTES',date:dateInd,debit:'54210000 (DCN)',credit:creditAcq,montant:ind,libelle:'RECU PAR VIRT INDEMNITE IMMOBILISATION'},
        {journal:'OD',date:dateInd,debit:creditAcq,credit:`${nv} (base RIB Inot)`,montant:ind,libelle:`VIRT INDEMNITE IMMOBILISATION ${p.ref||'[réf affaire]'}`},
      ]});
      checks.push(`✅ RECETTES indemnité — RECU PAR VIRT INDEMNITE IMMOBILISATION`,`✅ OD : ${acq} → ${nv} — VIRT INDEMNITE IMMOBILISATION [réf affaire]`,`💳 Virement sortant → ${nv}`);
    } else if(cas==='cas3'){
      ecritures.push({titre:'📅 PHASE 2 — Réception depuis notaire vendeur + virements',description:'RECETTES · OD provision · OD indemnité',rows:[
        {journal:'RECETTES',date:dateInd,debit:'54210000 (DCN)',credit:creditAcq,montant:ind,libelle:'RECU PAR VIRT INDEMNITE IMMOBILISATION'},
        {journal:'OD',date:dateInd,debit:creditAcq,credit:`${nv} (base RIB Inot)`,montant:prov>0?String(prov):'0',libelle:`VIRT PROVISION SUR FRAIS ${p.ref||'[réf affaire]'}`},
        {journal:'OD',date:dateInd,debit:creditAcq,credit:`${nv} (base RIB Inot)`,montant:ind,libelle:`VIRT INDEMNITE IMMOBILISATION ${p.ref||'[réf affaire]'}`},
      ]});
      checks.push(`✅ RECETTES indemnité — RECU PAR VIRT INDEMNITE IMMOBILISATION`,`✅ OD provision → ${nv} — VIRT PROVISION SUR FRAIS [réf affaire]`,`✅ OD indemnité → ${nv} — VIRT INDEMNITE IMMOBILISATION [réf affaire]`);
    } else {
      ecritures.push({titre:'📅 RÉCEPTION INDEMNITÉ — Séquestre (2 étapes)',description:'Étape 1 : RECETTES · Étape 2 : OD → séquestre',rows:[
        {journal:'RECETTES',date:dateSig,debit:'54210000 (DCN)',credit:creditAcq,montant:ind,libelle:'RECU PAR VIRT INDEMNITE IMMOBILISATION'},
        {journal:'OD',date:dateSig,debit:creditAcq,credit:`Séquestre — cpt ${cptSeq}`,montant:ind,libelle:`VIRT INDEMNITE IMMOBILISATION AU COMPTE ${cptSeq}`},
      ]});
      checks.push(`✅ RECETTES indemnité — RECU PAR VIRT INDEMNITE IMMOBILISATION`,`✅ OD : ${acq} → Séquestre ${cptSeq}`,`✅ Contrôle : Séquestre = ${fmt(ind)}`);
    }
    checks.push('📌 Taxe (émoluments promesse de vente) : à saisir par le comptable à son retour','📋 Conservation légale des pièces : 10 ans minimum (100 ans pour les actes authentiques)');
    return {ref:p.ref,nom:acq,ecritures,checks:checks.filter(Boolean)};
  };
});

/* Helpers communs */
const gNum = id => parseFloat(document.getElementById('f-'+id)?.value)||0;
const gVal = id => document.getElementById('f-'+id)?.value?.trim()||'';
const isCbOn = id => document.getElementById('cb-'+id)?.checked||false;

const computeDeductionsVendeur = () => ({
  syndicCh:   isCbOn('syndic') ? gNum('syndicch')  : 0,
  syndicHon:  isCbOn('syndic') ? gNum('syndichon') : 0,
  syndicNom:  gVal('syndicnom')||'Syndic',
  pretvMt:    isCbOn('pretv')  ? gNum('pretvmt')   : 0,
  pretvNom:   gVal('pretvnb')||'Banque',
  agvMt:      isCbOn('agvend') ? gNum('agvendmt')  : 0,
  agvNom:     gVal('agvendnm')||'Agence',
  pvMt:       isCbOn('pv')     ? gNum('pvmt')      : 0,
  mlMt:       isCbOn('ml')     ? gNum('mlmt')      : 0,
  procNb:     isCbOn('proc')   ? gNum('procnb')    : 0,
  procPu:     isCbOn('proc')   ? gNum('procpu')||60: 0,
  notaMt:     isCbOn('nota')   ? gNum('notamt')    : 0,
  copiesMt:   isCbOn('copies') ? gNum('copiesmt')  : 0,
  agacqMt:    isCbOn('agacq')  ? gNum('agacqmt')   : 0,
  agacqNom:   gVal('agacqnm')||'Agence',
});

COMPUTES['vente_cas1'] = p => {
  const acq  = p.nomacq||'Acquéreur';
  const vend = p.nomvend||'Vendeur';
  const cptAcq = p.cptacq||'';
  const cptVend= p.cptvend||'';
  const prix   = parseFloat(p.prix)||0;
  const pretType= p.prettype||'aucun';
  const pretMt = parseFloat(p.pretmt)||0;
  const banque = p.banque||'Banque';
  const cptBanque = p.cptbanque||'';
  const apport = parseFloat(p.apport)||0;
  const seqType= p.seqtype||'aucun';
  const indSeq = parseFloat(p.indseq)||0;
  const dateSeq= p.dateseq||p.date;
  const cptSeq = p.cptseq||'SEQ';
  const dt     = p.date||new Date().toISOString().split('T')[0];
  const creditAcq = `${acq}${cptAcq?' — cpt '+cptAcq:''}`;
  const creditVend= `${vend}${cptVend?' — cpt '+cptVend:''}`;
  const d = computeDeductionsVendeur();
  const syndicTotal = d.syndicCh + d.syndicHon;
  const totalDed = syndicTotal + d.pretvMt + d.agvMt + d.pvMt + d.mlMt;
  const disponible = prix - totalDed;
  const rec=[], ods=[], checks=[];

  // RECETTES
  if(pretType==='ssp'&&pretMt>0){
    rec.push({journal:'RECETTES',date:dt,debit:'54210000 (DCN)',credit:creditAcq,montant:String(pretMt),
      libelle:`PAR VIRT EN VUE ACQUISITION A REALISER (PRET SSP) PR LE COMPTE DE ${acq}`});
  }
  if(pretType==='hyp'&&pretMt>0){
    const ib=`BANQUE - ${banque}`;
    const cB=cptBanque?`cpt ${cptBanque}`:'cpt banque';
    rec.push({journal:'RECETTES',date:dt,debit:'54210000 (DCN)',credit:`${ib} — ${cB}`,montant:String(pretMt),
      libelle:`PAR VIRT EN VUE PRET PR LE COMPTE ${acq}`});
    ods.push({journal:'OD',date:dt,debit:`${ib} — ${cB}`,credit:creditAcq,montant:String(pretMt),
      libelle:`VIRT MONTANT PRET AU COMPTE &CONTREPARTIE`});
  }
  if(apport>0){
    rec.push({journal:'RECETTES',date:dt,debit:'54210000 (DCN)',credit:creditAcq,montant:String(apport),
      libelle:`PAR VIRT EN VUE ACQUISITION (APPORT PERSO)`});
  }

  // OD séquestre
  if(seqType==='promesse'&&indSeq>0){
    ods.push({journal:'OD',date:dateSeq,debit:`Séquestre — cpt ${cptSeq}`,credit:creditVend,montant:String(indSeq),
      libelle:`RESTIT INDEMNITE IMMOBILISATION POUR PARTIE PRIX DE VENTE AU COMPTE &CONTREPARTIE`});
  }
  if(seqType==='compromis'&&indSeq>0){
    ods.push({journal:'OD',date:dateSeq,debit:`Séquestre — cpt ${cptSeq}`,credit:creditAcq,montant:String(indSeq),
      libelle:`VIRT RESTIT DEPOT DE GARANTIE POUR PARTIE PRIX DE VENTE AU COMPTE &CONTREPARTIE`});
  }

  // OD prix
  const solde = seqType==='promesse'&&indSeq>0 ? prix-indSeq : prix;
  ods.push({journal:'OD',date:dt,debit:creditAcq,credit:creditVend,montant:String(solde),
    libelle:`VIRT PARTIE PRIX VENTE AU COMPTE &CONTREPARTIE`});

  // OD Notarisque
  if(d.notaMt>0){
    ods.push({journal:'OD',date:dt,debit:creditVend,credit:'40112012 (NOTARISQUE)',montant:String(d.notaMt),
      libelle:`VIRT COUT ETAT DES RISQUES AU COMPTE NOTARISQUE`});
  }

  // OD agence acquéreur
  if(d.agacqMt>0){
    ods.push({journal:'OD',date:dt,debit:creditAcq,credit:`AGENCE - ${d.agacqNom} — cpt à créer`,montant:String(d.agacqMt),
      libelle:`Commission agence (charge acquéreur) — ${d.agacqNom}`});
  }

  const ecritures=[];
  if(rec.length) ecritures.push({titre:'📅 RÉCEPTION DES FONDS (RECETTES)',description:'Journal RECETTES — Virements entrants sur DCN',rows:rec});
  ecritures.push({titre:'📅 VENTILATION JOUR J (OD)',description:'Journal OD — Prix de vente, séquestre, déductions',rows:ods});

  // Checks
  if(pretType==='ssp'&&pretMt>0) checks.push(`✅ RECETTES prêt SSP ${fmt(pretMt)} — PAR VIRT EN VUE ACQUISITION A REALISER (PRET SSP) PR LE COMPTE DE ${acq}`);
  if(pretType==='hyp'&&pretMt>0) checks.push(`✅ RECETTES prêt hyp. ${fmt(pretMt)} — PAR VIRT EN VUE PRET PR LE COMPTE ${acq}`, `✅ OD : BANQUE - ${banque} → ${acq} — VIRT MONTANT PRET AU COMPTE &CONTREPARTIE`);
  if(apport>0) checks.push(`✅ RECETTES apport ${fmt(apport)} — PAR VIRT EN VUE ACQUISITION (APPORT PERSO)`);
  checks.push(`✅ OD prix ${fmt(solde)} : ${acq} → ${vend} — VIRT PARTIE PRIX VENTE AU COMPTE &CONTREPARTIE`);
  if(seqType!=='aucun'&&indSeq>0) checks.push(`✅ OD déblocage séquestre ${fmt(indSeq)} — voir libellé dans les écritures`);
  if(d.notaMt>0) checks.push(`✅ OD Notarisque ${fmt(d.notaMt)} : ${vend} → 40112012 — VIRT COUT ETAT DES RISQUES AU COMPTE NOTARISQUE`);
  if(syndicTotal>0) checks.push(`💳 Virt opposition syndic → ${d.syndicNom} : ${fmt(syndicTotal)} — ⚠️ Vérifier RIB avant virement`);
  if(d.pretvMt>0)   checks.push(`💳 Virt rembt prêt → ${d.pretvNom} : ${fmt(d.pretvMt)} — ⚠️ Vérifier RIB avant virement`);
  if(d.agvMt>0)     checks.push(`💳 Virt commission agence (charge vendeur) → ${d.agvNom} : ${fmt(d.agvMt)}`);
  if(d.pvMt>0)      checks.push(`📌 Plus-value ${fmt(d.pvMt)} : conservée sur cpt ${vend} — virement SPF différé`);
  if(d.mlMt>0)      checks.push(`📌 Mainlevée ${fmt(d.mlMt)} : conservée sur cpt ${vend} jusqu'à la mainlevée`);
  if(d.procNb>0)    checks.push(`📌 Procuration SSP ${d.procNb} × ${fmt(d.procPu)} = ${fmt(d.procNb*d.procPu)} — taxe par le comptable`);
  if(d.copiesMt>0)  checks.push(`📌 Copies actes ${fmt(d.copiesMt)} — taxe par le comptable`);
  checks.push(`💳 Virt disponible → ${vend} : ${fmt(disponible)}`, `✅ Contrôle : cpt ${vend} soldé (hors montants réservés)`, `📌 Émoluments + SPF : taxe par le comptable`, `📋 Conservation légale : 10 ans minimum`);

  return {ref:p.ref, nom:acq, ecritures, checks:checks.filter(Boolean)};
};

COMPUTES['vente_cas3'] = p => {

COMPUTES['repartition_ssion'] = p => {
  const nom = p.nomdef||'D\u00e9funt', cptS = `SUCCESSION ${nom.toUpperCase()}`;
  const actifBrut = parseFloat(p.actifBrut)||0;
  const passif    = parseFloat(p.passif)||0;
  const actifNet  = actifBrut - passif;

  // Déductions Section B
  const dn = (id) => parseFloat(document.getElementById('f-'+id)?.value)||0;
  const isCb = (id) => document.getElementById('cb-'+id)?.checked||false;
  const deds = [];
  if(isCb('rnotoriete'))  deds.push({lib:'Acte de notori\u00e9t\u00e9',      cpt:'467100',  mt:dn('rnotoriete')});
  if(isCb('rinventaire')) {
    const invs = S.subs['inv']||[];
    invs.forEach((v,i)=>{
      const mt2 = parseFloat(document.getElementById('inv-mt-'+i)?.value)||0;
      const lb2 = document.getElementById('inv-lib-'+i)?.value||'Inventaire';
      if(mt2>0) deds.push({lib:lb2, cpt:'467100', mt:mt2});
    });
  }
  if(isCb('rattestprop')) deds.push({lib:'Attestation de propri\u00e9t\u00e9', cpt:'467100',  mt:dn('rattestprop')});
  if(isCb('rdmtg'))       deds.push({lib:'DMTG (Droits d\u00e9claration)',    cpt:'44220000', mt:dn('rdmtg')});
  if(isCb('rdroits'))     deds.push({lib:'Droits de succession',              cpt:'44220000', mt:dn('rdroits')});
  if(isCb('rpretdef'))    deds.push({lib:`Rembt pr\u00eat d\u00e9funt — ${document.getElementById('f-rpretdefBanque')?.value||'Banque'}`, cpt:'467100', mt:dn('rpretdef')});
  if(isCb('ragence'))     deds.push({lib:'Commission agence',                 cpt:'467100',  mt:dn('ragence')});
  if(isCb('rlibre')) {
    const libL = document.getElementById('f-rlibLib')?.value||'D\u00e9duction';
    deds.push({lib:libL, cpt:'467100', mt:dn('rlibre')});
  }
  const totalDed = deds.reduce((s,d)=>s+d.mt,0);
  const solde = actifNet - totalDed;

  // Héritiers Section C
  const hers = (S.subs['her']||[]).map((_,i)=>({
    nom: document.getElementById('rep-her-nom-'+i)?.value||'',
    qp:  parseFloat(document.getElementById('rep-her-qp-'+i)?.value)||0,
  })).filter(h=>h.nom);
  const totalQp = hers.reduce((s,h)=>s+h.qp,0);

  const dt = p.date||today();
  const rows = [];

  // OD déductions
  deds.forEach(d=>{
    if(d.mt>0) rows.push({journal:'OD',date:dt,debit:cptS,credit:`${d.cpt}`,montant:String(d.mt),libelle:d.lib});
  });
  // OD héritiers
  hers.forEach(h=>{
    const mt2 = hers.length===1 ? solde : Math.round(solde * h.qp / 100 * 100)/100;
    const lib2 = hers.length===1 ? 'VIRT DISPO FONDS SSION' : `VIRT QP DISPO FONDS DE SSION (${h.qp}%)`;
    rows.push({journal:'OD',date:dt,debit:cptS,credit:h.nom,montant:String(mt2),libelle:lib2});
  });

  const checks = [
    `\ud83d\udccb Actif net : ${fmt(actifNet)}`,
    ...deds.map(d=>`\u2705 OD d\u00e9duction ${fmt(d.mt)} \u2014 ${d.lib}`),
    totalQp===100 ? `\u2705 Total quotes-parts : 100% OK` : `\u26a0\ufe0f Total quotes-parts : ${totalQp}% (doit \u00e9galer 100%)`,
    ...hers.map(h=>`\u2705 OD ${h.qp}% \u2192 ${h.nom}`),
    `\ud83d\udccc \u00c9moluments de tous actes successoraux : module TAXE (comptable)`,
    `\ud83d\udccb Conservation l\u00e9gale : 10 ans minimum (100 ans actes authentiques)`,
  ];
  return {ref:p.ref, nom:cptS, ecritures:[{titre:'&#128197; OD — Compte de r\u00e9partition succession',description:'Journal OD — D\u00e9ductions + H\u00e9ritiers',rows}], checks};

  var ht   = parseFloat((document.getElementById('div-ht')  ? document.getElementById('div-ht').value  : String(da.mtHT)))||(da.mtHT||0);
  var ttc  = parseFloat((document.getElementById('div-ttc') ? document.getElementById('div-ttc').value : ''))||(ht*nb*1.20);

  var rows = [{
    journal: 'RECETTES', date: date,
    debit: '54210000 (DCN)', credit: credit,
    montant: ttc,
    libelle: libPrincipal
  }];

  if(prov > 0){
    rows.push({
      journal: 'RECETTES', date: date,
      debit: '54210000 (DCN)', credit: credit,
      montant: prov,
      libelle: 'RECU PAR VIRT PROVISION SUR FRAIS'
    });

    inotLines.push(r.journal + ';' + dateInot + ';' + credit + ';' + lib + ';;' + m + ';' + ref);

  var checks = [
    'Journee comptable ouverte dans Inot Compta',

    'Saisir RECETTES \u2014 ' + ml + ' ' + fmt(ttc) + ' \u2014 ' + credit,
    prov > 0 ? 'Saisir RECETTES \u2014 provision sur frais ' + fmt(prov) + ' \u2014 ' + credit : null,
    'Conservation legale des pieces : 10 ans minimum (100 ans pour les actes authentiques)',
  ].filter(Boolean);

  var result = {
    ref: ref, nom: nom,
    _isDivers: true,
    _csvInotLines: inotLines,
    ecritures: [{
      titre: 'RECETTES \u2014 ' + esc(da.label),
      description: ml + ' \u00b7 ' + (da.isConsult ? '706200 Honoraires libres' : '706100 Emoluments tarifes') + ' \u00b7 ' + nbLabel,
      rows: rows
    }],
    checks: checks
  };

  _lastResult = result;
  _ckDone = 0; _ckTotal = checks.length;
  showModal(result);
  toast('Ecritures generees', '\u2713');
};

/* Export CSV Inot Compta (Journal;Date;Compte;Libelle;Debit;Credit;Reference) */
const exportInotCSV = function(){
  if(!_lastResult || !_lastResult._csvInotLines) return;
  var lines = _lastResult._csvInotLines;
  var ref   = (_lastResult.ref || 'dossier').replace(/\s/g,'_');
  var csv   = '\uFEFFJournal;Date;Compte;Libelle;Debit;Credit;Reference\r\n' + lines.join('\r\n') + '\r\n';
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
  a.download = 'NC_' + ref + '_' + today() + '.csv';
  a.click();
};

const getDeadline = (day, freq) => {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  if(freq === 'trimestriel') {
    const qMonths = [0,3,6,9];
    for(let i=0; i<8; i++){
      const qm = qMonths[i%4], qy = y + Math.floor(i/4);
      const dl = new Date(qy, qm, day);
      if(dl > now) return Math.round((dl - now) / 86400000);
    }
    return 999;
  }
  if(freq === 'annuel') {
    let dl = new Date(y, 0, day);
    if(dl <= now) dl = new Date(y+1, 0, day);
    return Math.round((dl - now) / 86400000);
  }
  let dl = new Date(y, m, day);
  if(dl <= now) dl = new Date(y, m+1, day);
  return Math.round((dl - now) / 86400000);
};

        ${on ? '<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
      </div>
      <span style="font-size:13px;color:${on ? '#1A5C35' : 'var(--ink)'};text-decoration:${on ? 'line-through' : 'none'};opacity:${on ? 0.65 : 1}">${esc(t)}</span>
    </div>`;
  }).join('');

  // --- Bloc 2 : Actes du jour ---
  const statutStyles = {
    attente:   { bg:'#FEF2F2', color:'#8B1A1A', next:'ecritures', label:'🔴 À saisir' },
    ecritures: { bg:'#FFF8E7', color:'#8B5A00', next:'taxe',      label:'🟡 Écritures OK' },
    taxe:      { bg:'#EDF7F1', color:'#1A5C35', next:'attente',   label:'✅ Taxé' },
  };
  const acteHeaderHTML = d.actes.length > 0
    ? `<div style="display:grid;grid-template-columns:1fr 130px 150px 32px;gap:8px;padding:5px 10px 6px;font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);border-bottom:1px solid var(--rule)"><div>Dossier / Référence</div><div>Type</div><div>Statut</div><div></div></div>` : '';
  const actesHTML = d.actes.length === 0
    ? `<div style="text-align:center;padding:24px;color:var(--ink4);font-size:12px;font-style:italic">Aucun acte — cliquez "+ Acte" pour commencer</div>`
    : d.actes.map((a, i) => {
        const ss = statutStyles[a.statut || 'attente'];
        return `<div style="display:grid;grid-template-columns:1fr 130px 150px 32px;gap:8px;align-items:center;padding:8px 10px;background:${i % 2 ? '#F8F5EE' : '#FDFBF6'};border-radius:4px;margin:2px 0">

          <select data-a="dashActeType" data-i="${i}" style="font-size:11px;border:1px solid var(--rule2);border-radius:4px;padding:5px 6px;background:var(--paper);color:var(--ink);width:100%">
            ${TYPE_ACTES_DASH.map(t => `<option value="${t}"${a.type === t ? ' selected' : ''}>${t}</option>`).join('')}
          </select>
          <button data-a="dashStatut" data-i="${i}" style="font-size:10px;font-weight:700;padding:5px 8px;border-radius:4px;border:1px solid ${ss.color}60;background:${ss.bg};color:${ss.color};cursor:pointer;white-space:nowrap;text-align:center;width:100%">${ss.label}</button>
          <button data-a="dashRmActe" data-i="${i}" style="color:var(--ink4);background:transparent;border:1px solid var(--rule2);border-radius:4px;padding:3px 7px;cursor:pointer;font-size:14px">×</button>
        </div>`;
      }).join('');

  // --- Bloc 3 : Déclarations ---
  const declHTML = DECLARATIONS_ECHEANCES.map((decl, i) => {
    const diff = getDeadline(decl.day, decl.freq||'mensuel');
    const isDone = d.declDone.has(i);
    const color = isDone ? '#1A5C35' : diff <= 3 ? '#8B1A1A' : diff <= 7 ? '#8B5A00' : '#1A5C35';
    const bg    = isDone ? '#EDF7F1' : diff <= 3 ? '#FEF2F2' : diff <= 7 ? '#FFF8E7' : '#EDF7F1';
    const badge = isDone ? '✅ Traité ce mois'
      : diff <= 0 ? '🔴 AUJOURD\'HUI'
      : diff === 1 ? '🔴 DEMAIN'
      : diff <= 3 ? `🔴 J-${diff}`
      : diff <= 7 ? `🟡 J-${diff}`
      : `🟢 J-${diff}`;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:${bg};border-radius:6px;border:1px solid ${color}25;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:18px">${decl.icon}</span>
        <div>
          <div style="font-weight:700;font-size:13px;color:${color}">${decl.label}</div>
          <div style="font-size:10px;color:var(--ink3);margin-top:1px">${decl.note} · avant le <strong>${decl.day}</strong> du mois</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-family:var(--ff-mono);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:${color}15;color:${color};border:1px solid ${color}40">${badge}</span>

      </div>
    </div>`;
  }).join('');

  // --- Bloc 4 : Alertes dossiers ---
  const prioColors = { haute:'#8B1A1A', moyenne:'#8B5A00', basse:'#1A5C35' };
  const prioLabels = { haute:'🔴 Haute', moyenne:'🟡 Moyenne', basse:'🟢 Basse' };

    ? `<div style="text-align:center;padding:20px;color:var(--ink4);font-size:12px;font-style:italic">Aucune alerte — cliquez "+ Alerte" pour ajouter un dossier en attente</div>`

          <button data-a="dashRmAlert" data-i="${i}" style="color:var(--ink4);background:transparent;border:1px solid var(--rule2);border-radius:4px;padding:3px 7px;cursor:pointer;font-size:14px">×</button>
        </div>`;
      }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div>
        <div class="home-eyebrow">Gestion quotidienne · Inot Compta / Génapi</div>
        <h1 class="home-title">Tableau de <em>bord</em></h1>
        <p class="home-sub">${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
      </div>
      <div style="text-align:right;padding-top:6px">
        <div style="font-family:var(--ff-mono);font-size:11px;color:${allDone ? '#1A5C35' : 'var(--ink3)'}">Ouverture ${done}/${total}</div>
        <div style="width:120px;height:5px;background:var(--rule);border-radius:3px;margin-top:5px;overflow:hidden"><div style="height:5px;background:${allDone ? '#1A5C35' : '#C8A045'};width:${pct}%;border-radius:3px;transition:width .3s"></div></div>
      </div>
    </div>

    <div class="section-divider">
      <div class="sd-bar" style="background:#1A5C35"></div>
      <span class="sd-label" style="color:#1A5C35">☀️ Checklist ouverture de journée</span>
      <div class="sd-line"></div>
      <span style="font-family:var(--ff-mono);font-size:10px;color:${allDone ? '#1A5C35' : 'var(--ink3)'};">${allDone ? '✅ Journée ouverte' : `${done}/${total} étapes`}</span>

    <div class="section-divider" style="margin-top:0">
      <div class="sd-bar" style="background:#1A2744"></div>

    <div class="section-divider" style="margin-top:0">
      <div class="sd-bar" style="background:#8B1A1A"></div>

const todayMonthYear = () => {
  const d = new Date();
  const M=['JANVIER','FÉVRIER','MARS','AVRIL','MAI','JUIN','JUILLET','AOÛT','SEPTEMBRE','OCTOBRE','NOVEMBRE','DÉCEMBRE'];
  return M[d.getMonth()]+' '+d.getFullYear();
};

/* Remplace &CIV &NOM &PRENOM par les valeurs saisies */
const applyVars = (lib, nom, civ) => {
  let s = lib;
  if(civ) s = s.replace(/&CIV/g, civ.toUpperCase());
  if(nom) {
    const parts = nom.trim().split(/\s+/);
    const prenom = parts.length > 1 ? parts.slice(1).join(' ').toUpperCase() : '';
    const nfam = parts[0].toUpperCase();
    s = s.replace(/&NOM &PRENOM/g, nfam + (prenom?' '+prenom:''));
    s = s.replace(/&NOM/g, nfam);
    s = s.replace(/&PRENOM/g, prenom);
  }
  return s;
};

/* ─── COMPUTE DCN ─────────────────────────────────────────────────── */
const computeBanqueDcn = function() {
  var id = window._bqDcnId; if(!id) return null;
  var mvt = MVT_DCN.find(function(m){return m.id===id;}); if(!mvt) return null;
  var dt   = document.getElementById('f-date')?.value || today();
  var ref  = document.getElementById('f-ref')?.value?.trim() || '';
  var mt   = document.getElementById('bq-mt')?.value?.trim() || '';
  var mode = document.getElementById('f-bqmode')?.value || 'virement';
  var mkey = mode==='cheque'?'chq':mode==='cb'?'cb':'virt';
  var lib  = document.getElementById('bq-lib-custom')?.value?.trim()
           || document.getElementById('bq-lib-text')?.textContent?.trim()
           || mvt.libs[mkey] || mvt.libs.virt || '';
  if(!mt||parseFloat(mt)<=0) { toast('Montant requis','\u26a0\ufe0f'); return null; }

  // Build parties strings
  var nom  = document.getElementById('bq-nom')?.value?.trim() || '';
  var cpt  = document.getElementById('bq-cpt')?.value?.trim() || '';
  var civ  = document.getElementById('bq-civ')?.value?.trim() || '';
  var ssion = document.getElementById('bq-ssion')?.value?.trim() || '';
  var cptssion = document.getElementById('bq-cptssion')?.value?.trim() || '';
  var seq  = document.getElementById('bq-seq')?.value?.trim() || '';
  var vend = document.getElementById('bq-vend')?.value?.trim() || '';
  var cptv = document.getElementById('bq-cptv')?.value?.trim() || '';
  var acq  = document.getElementById('bq-acq')?.value?.trim() || '';
  var cptacq = document.getElementById('bq-cptacq')?.value?.trim() || '';
  var banque = document.getElementById('bq-banque')?.value?.trim() || '';
  var cptbanque = document.getElementById('bq-cptbanque')?.value?.trim() || '';
  var tiers = document.getElementById('bq-tiers')?.value?.trim() || '';
  var nom2 = document.getElementById('bq-nom2')?.value?.trim() || '';
  var cpt2 = document.getElementById('bq-cpt2')?.value?.trim() || '';
  var donateur = document.getElementById('bq-donateur')?.value?.trim() || '';
  var cptdonateur = document.getElementById('bq-cptdonateur')?.value?.trim() || '';
  var donataire = document.getElementById('bq-donataire')?.value?.trim() || '';
  var cptdonataire = document.getElementById('bq-cptdonataire')?.value?.trim() || '';
  var heritier = document.getElementById('bq-heritier')?.value?.trim() || '';
  var cptheritier = document.getElementById('bq-cptheritier')?.value?.trim() || '';

  var nomPrincipal = nom||ssion||donateur||acq||banque||tiers||'';
  lib = applyVars(lib, ssion||nom, civ);

  // Build compte strings
  var cStr = function(n,c){return n+(c?' \u2014 cpt '+c:'');};
  var mapCred = {
    '54210000':'54210000 (DCN)','54120000':'54120000 (Ch\u00e8ques \u00e0 encaisser)',
    '54121000':'54121000 (CB \u00e0 encaisser)','541200':'54120000 (Ch\u00e8ques \u00e0 encaisser)',
    'client':cStr(nom,cpt),'ssion':cStr(ssion,cptssion),'sequestre':cStr(seq,''),
    'vendeur':cStr(vend,cptv),'naVend':cStr(vend,cptv),'acq':cStr(acq,cptacq),
    'naAcq':cStr(acq,cptacq),'banque':cStr(banque,cptbanque),'tiers':tiers,
    'client2':cStr(nom2,cpt2),'donateur':cStr(donateur,cptdonateur),
    'donataire':cStr(donataire,cptdonataire),'heritier':cStr(heritier,cptheritier),
    'notarisque':'40112012 (NOTARISQUE)','tresor':'44220000 (Droits Trésor)',
  };
  var getC = function(key){return mapCred[key]||key;};

  var debStr  = (mvt.type==='rec') ? (mvt.deb==='54120000'||mvt.deb==='54121000'?getC(mvt.deb):'54210000 (DCN)') : (mapCred[mvt.deb]||mvt.deb);
  var credStr = mvt.fixedCred || getC(mvt.cred);

  var rows = [];
  var journal = mvt.type==='rec' ? 'RECETTES' : 'OD';
  rows.push({journal:journal, date:dt, debit:debStr, credit:credStr, montant:mt, libelle:lib});

  // OD dépôt si chèque/CB
  if(mvt.od_lib && mvt.type==='rec') {
    rows.push({journal:'OD', date:dt, debit:'54210000 (DCN)', credit:debStr, montant:mt, libelle:mvt.od_lib});
  }

  var checks = [
    'Journ\u00e9e comptable ouverte dans Inot Compta',
    '\u2705 '+journal+' '+fmt(parseFloat(mt)||0)+' \u2014 '+lib,
    mvt.od_lib ? ('\u2705 OD d\u00e9p\u00f4t : '+mvt.od_lib) : '',
    mvt.lib_inv ? ('Libell\u00e9 inverse (cr\u00e9dit) : '+mvt.lib_inv) : '',
    '\ud83d\udccb Conservation l\u00e9gale : 10 ans minimum',
  ].filter(Boolean);

  return {ref:ref||lib.substring(0,30), nom:nomPrincipal||mvt.label,
          ecritures:[{titre:'&#128197; '+mvt.label, description:lib, rows:rows}], checks:checks};
};

/* ─── COMPUTE OFFICE ──────────────────────────────────────────────── */
const computeBanqueOff = function(reglement) {
  var id = window._bqOffId; if(!id) return null;
  var mvt = MVT_OFFICE.find(function(m){return m.id===id;}); if(!mvt) return null;
  var dt      = document.getElementById('f-date')?.value || today();
  var ref     = document.getElementById('f-ref')?.value?.trim()||'';
  var mt      = document.getElementById('bq-mt')?.value?.trim()||'';
  var mt2     = document.getElementById('bq-mt2')?.value?.trim()||mt;
  var ref2    = document.getElementById('bq-ref2')?.value?.trim()||'';
  var offNom  = document.getElementById('bq-off-nom')?.value?.trim()||mvt.nom||'Fournisseur';
  var cptCh   = document.getElementById('bq-cpt-ch')?.value?.trim()||mvt.cpt_ch||'';
  var cptF    = document.getElementById('bq-cpt-f')?.value?.trim()||mvt.cpt_f||'';
  var libelle = document.getElementById('bq-lib')?.value?.trim()||('FACTURE '+offNom.toUpperCase());

  if(!mt||parseFloat(mt)<=0) { toast('Montant requis','\u26a0\ufe0f'); return null; }

  var rows = [];
  // Étape 1 : charges
  if(!reglement) {
    rows.push({journal:'OD', date:dt, debit:cptCh+' ('+offNom+')', credit:cptF+' (Fournisseur)', montant:mt, libelle:libelle});
  } else {
    // Étape 2 : règlement VIRT ou PLVT
    var isPlvt = reglement==='plvt';
    var libReg = isPlvt ? ('PLVT FACTURE '+offNom.toUpperCase()+' '+todayMonthYear()) : ('VIRT FACTURE '+offNom.toUpperCase()+' '+todayMonthYear());
    if(ref2) libReg += ' REF '+ref2.toUpperCase();
    rows.push({journal:'OD', date:dt, debit:cptF+' ('+offNom+')', credit:'51210000 (CDC Compte Office)', montant:mt2||mt, libelle:libReg});
  }

  var titre = reglement ? ('\u127970 Office \u2014 '+offNom+' \u2014 '+(reglement==='plvt'?'PLVT':'VIRT')) : ('\u127970 Office \u2014 Charge \u2014 '+offNom);
  var checks = [
    'V\u00e9rifier relev\u00e9 compte Office (CDCNET ou banque)',
    '\u2705 OD '+(reglement?'r\u00e8glement':'charge')+' '+fmt(parseFloat(reglement?mt2||mt:mt)||0)+' \u2014 '+offNom,
    !reglement ? '\u27a1 Apr\u00e8s validation, cliquez VIRT ou PLVT pour passer l\u2019\u00e9criture de r\u00e8glement' : '',
    '\ud83d\udccb Conserver la pi\u00e8ce justificative : 10 ans minimum',
  ].filter(Boolean);

  return {ref:ref||libelle.substring(0,30), nom:offNom,
          ecritures:[{titre:titre, description:libelle, rows:rows}], checks:checks};
};
