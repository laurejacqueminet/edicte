/* ── Calcul barème proportionnel ── */
const calcProp = (valeur, taux) => {
  const tranchesBornes = [6500, 17000, 60000, Infinity];
  const tranchesBase   = [0,    6500,  17000, 60000];
  let emol = 0, reste = valeur;
  for(let i=0;i<4;i++){
    if(reste<=0) break;
    const assiette = Math.min(reste, tranchesBornes[i]-tranchesBase[i]);
    emol += assiette * taux[i] / 100;
    reste -= assiette;
    if(valeur<=tranchesBornes[i]) break;
  }
  return Math.round(emol*100)/100;
};

const calcPropDetail = (valeur, taux) => {
  const bornes  = [6500, 17000, 60000, Infinity];
  const bases   = [0, 6500, 17000, 60000];
  const labels  = ['0 — 6 500', '6 500 — 17 000', '17 000 — 60 000', '> 60 000'];
  const rows = [];
  let reste = valeur;
  for(let i=0;i<4;i++){
    if(reste<=0) break;
    const assiette = Math.min(reste, bornes[i]-bases[i]);
    const part = Math.round(assiette*taux[i]/100*100)/100;
    rows.push(labels[i]+' € : '+taux[i].toFixed(3)+'% x '+fmt(assiette)+' = '+fmt(part));
    reste -= assiette;
    if(valeur<=bornes[i]) break;
  }
  return rows.join('<br>');
};

/* Config persistée en sessionStorage (effacée à la fermeture du navigateur) */
const genapicfg = () => { try { return JSON.parse(sessionStorage.getItem('_gcfg')||'{}'); } catch(e) { return {}; } };
const genapicfgSet = v => sessionStorage.setItem('_gcfg', JSON.stringify({...genapicfg(),...v}));

/* Fetch authentifié Génapi */
const gFetch = async (endpoint, opts={}) => {
  const c = genapicfg();
  if(!c.baseUrl||!c.ctaId) throw new Error('Configuration manquante — renseignez l\'URL et le token dans l\'intercalaire Connexion Inot');
  const url = `https://${c.baseUrl}${endpoint}`;
  const resp = await fetch(url, {
    ...opts,
    credentials: 'include',
    headers: {
      'cta-id': c.ctaId,
      'Accept': 'application/json, text/plain',
      'Accept-Charset': 'utf-8',
      'client-version': '26.2.1.1',
      ...(opts.headers||{})
    }
  });
  const text = await resp.text();
  if(!resp.ok) throw new Error(`Erreur ${resp.status} — ${text.substring(0,200)}`);
  try { return JSON.parse(text); } catch(e) { return text; }
};

/* Récupérer la journée comptable ouverte */
const gGetJournee = async () => {
  const c = genapicfg();
  // Utiliser la journée en cache si disponible (mise en cache par le test de connexion)
  if(c._journee && c._journee.Id) return c._journee;
  // Endpoint exact capturé depuis Fiddler
  try {
    const data = await gFetch('/compta/api/Journal/GetListeElementJournalDtos/?idJourneeComptable=0&codeJournal=CR&start=0&limit=1&idFolio=0');
    if(data && data.Items && data.Items.length) {
      const j = data.Items[0].JourneeComptable;
      if(j && j.Id) return j;
    }
  } catch(e) {}
  throw new Error('Journée comptable introuvable — cliquez d\'abord "Tester la connexion" dans l\'onglet Connexion Inot');
};

/* Récupérer un compte client par numéro de compte */
const gGetCompte = async numeroCompte => {
  const data = await gFetch(`/compta/api/CompteComptableClient/GetByNumeroCompte/?numeroCompte=${encodeURIComponent(numeroCompte)}`);
  const id = data && (data.Id || data.id || (data.Items && data.Items[0] && data.Items[0].Id));
  if(!id) throw new Error(`Compte ${numeroCompte} non trouvé dans Inot Compta`);
  return { id, data };
};

/* ── Chargement dynamique du formulaire de taxation par acte ── */
const loadActeTaxe = () => {
  const sel  = document.getElementById('tarif-acte-sel');
  const zone = document.getElementById('taxe-form-zone');
  const bar  = document.getElementById('taxe-action-bar');
  if(!sel||!zone) return;
  const idx = parseInt(sel.value);
  if(isNaN(idx)||idx<0||idx>=ACTES_TAXE.length){ zone.innerHTML=''; if(bar) bar.style.display='none'; return; }
  const acte = ACTES_TAXE[idx];
  if(bar) bar.style.display='flex';

  // Déterminer le type d'émolument et le barème
  var isProp = acte.propIdx !== undefined;
  var isFix  = acte.fixeIdx !== undefined;
  var emolLabel = '', emolInfoHT = 0, barInfo = '';

  if(isProp){
    var p = TARIF_PROP[acte.propIdx];
    emolLabel = 'N°'+p.n+' Tab5 — '+p.label;
    barInfo   = 'Barème : '+p.t[0]+'% / '+p.t[1]+'% / '+p.t[2]+'% / '+p.t[3]+'%';
  } else if(isFix){
    var f = TARIF_FIXES[acte.fixeIdx];
    emolLabel = 'N°'+f.n+' Tab5 — '+f.label;
    emolInfoHT= f.mt;
  }

  // Construire les formalités applicables
  var formalitesHtml = '';
  if(acte.formDef && acte.formDef.length>0){
    formalitesHtml += '<div class="card" style="margin-bottom:12px">'
      +'<div class="card-hd"><div class="card-stripe" style="background:#1A2744"></div>'
      +'<span class="card-title">Formalités applicables (cocher celles effectuées)</span></div>'
      +'<div class="card-bd" style="padding:8px 14px">';
    acte.formDef.forEach(function(fi){
      if(fi>=TARIF_FORMALITES.length) return;
      var fm = TARIF_FORMALITES[fi];
      formalitesHtml += '<div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--paper3)">'
        +'<input type="checkbox" id="txfm-'+fi+'-on" style="width:14px;height:14px;cursor:pointer;accent-color:#1A2744;flex-shrink:0">'
        +'<span style="font-family:var(--ff-mono);font-size:10px;color:#7A1F1F;width:40px;font-weight:700">n°'+esc(fm.n)+'</span>'
        +'<span style="flex:1;font-size:12px;color:var(--ink)">'+esc(fm.label)+'</span>'
        +'<span style="font-family:var(--ff-mono);font-size:11px;color:#1A2744;font-weight:700;width:72px;text-align:right">'+fmt(fm.mt)+' HT</span>'
        +'<input type="number" id="txfm-'+fi+'-nb" value="1" min="1" style="width:50px;border:1px solid var(--rule2);border-radius:4px;padding:3px 6px;font-family:var(--ff-mono);font-size:11px;text-align:center">'
        +'</div>';
    });
    formalitesHtml += '</div></div>';
  }

  // Droits & taxes section selon type d'acte
  var droitsHtml = '<div class="card" style="margin-bottom:12px">'
    +'<div class="card-hd"><div class="card-stripe" style="background:#2D4A6E"></div>'
    +'<span class="card-title">Droits &amp; taxes (saisir les montants)</span></div>'
    +'<div class="card-bd">'
    +'<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr))">';

  if(acte.spf){
    droitsHtml += '<div class="f"><label>Droits (TPF / DMTO / DMTG)</label>'
      +'<input id="txdr-droits" type="number" step="0.01" placeholder="Montant € calculé" style="border:1.5px solid var(--rule);border-radius:5px;padding:7px 10px;background:var(--paper2);width:100%;font-family:var(--ff-mono)"></div>';
    if(acte.csi){
      droitsHtml += '<div class="f"><label>CS — Contribution sécurité immobilière</label>'
        +'<input id="txdr-csi" type="number" step="0.01" placeholder="0,10% de la valeur + fixe" style="border:1.5px solid var(--rule);border-radius:5px;padding:7px 10px;background:var(--paper2);width:100%;font-family:var(--ff-mono)"></div>';
    }

      +'<input id="txdr-droits" type="number" step="0.01" placeholder="ex : 125,00" style="border:1.5px solid var(--rule);border-radius:5px;padding:7px 10px;background:var(--paper2);width:100%;font-family:var(--ff-mono)"></div>';
  }

  if(acte.partage){

      +'<input id="txdr-partage" type="number" step="0.01" placeholder="1,10% de l\'actif net" style="border:1.5px solid var(--rule);border-radius:5px;padding:7px 10px;background:var(--paper2);width:100%;font-family:var(--ff-mono)"></div>';
  }

  droitsHtml += '<div class="f"><label>Autres débours (total)</label>'
    +'<input id="txdr-debours" type="number" step="0.01" placeholder="Etat hypo., cadastre, diag..." style="border:1.5px solid var(--rule);border-radius:5px;padding:7px 10px;background:var(--paper2);width:100%;font-family:var(--ff-mono)"></div>';

  droitsHtml += '</div>';

  if(acte.enreg && ENREG_LABELS[acte.enreg]){
    droitsHtml += '<div class="ibox ib-blue" style="margin-top:8px;font-size:11px">&#128204; Type de droits : <strong>'+esc(ENREG_LABELS[acte.enreg])+'</strong></div>';
  }
  if(acte.spf){
    droitsHtml += '<div class="ibox ib-amber" style="font-size:11px">SPF : Le forfait de formalités n°194 (339,58 € HT) est inclus dans les formalités ci-dessus. La CSI est perçue directement par le SPF lors de la publication.</div>';
  }
  droitsHtml += '</div></div>';

  // Emolument principal
  var emolHtml = '<div class="card" style="margin-bottom:12px">'
    +'<div class="card-hd"><div class="card-stripe" style="background:#7A1F1F"></div>'
    +'<span class="card-title">Emolument principal — '+esc(emolLabel)+'</span></div>'
    +'<div class="card-bd">';

  if(isProp){
    emolHtml += '<div class="ibox ib-navy" style="margin-bottom:12px;font-size:11px">'+esc(barInfo)+'</div>'
      +'<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr))">'
      +'<div class="f"><label>Base / Valeur de l\'acte (€) <span class="req">*</span></label>'
      +'<input id="txem-base" type="number" step="100" placeholder="ex : 250000" oninput="calcEmolLive()" style="border:1.5px solid var(--rule);border-radius:5px;padding:7px 10px;background:var(--paper2);width:100%;font-size:13px;font-family:var(--ff-mono)"></div>'
      +'</div>'
      +'<div id="txem-result" style="display:none;background:var(--paper3);border-radius:8px;padding:12px;margin-top:10px">'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;text-align:center">'
      +'<div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:3px">Emolument HT</div>'
      +'<div id="txem-ht" style="font-family:var(--ff-mono);font-size:16px;font-weight:700;color:#7A1F1F">—</div></div>'
      +'<div style="border-left:1px solid var(--rule)">'
      +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:3px">TVA 20%</div>'
      +'<div id="txem-tva" style="font-family:var(--ff-mono);font-size:16px;font-weight:700;color:var(--ink3)">—</div></div>'
      +'<div style="border-left:1px solid var(--rule)">'
      +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:3px">TTC</div>'
      +'<div id="txem-ttc" style="font-family:var(--ff-mono);font-size:16px;font-weight:700;color:#1A5C35">—</div></div>'
      +'<div style="border-left:1px solid var(--rule)">'
      +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:3px">Détail tranches</div>'
      +'<div id="txem-detail" style="font-size:9px;color:var(--ink4);font-family:var(--ff-mono);line-height:1.7;text-align:left">—</div></div>'
      +'</div></div>'
      +'<input type="hidden" id="txem-ht-val" value="">';
  } else if(isFix){
    emolHtml += '<div style="display:flex;align-items:center;gap:16px;padding:10px 0">'
      +'<span style="font-family:var(--ff-mono);font-size:22px;font-weight:700;color:#7A1F1F">'+fmt(emolInfoHT)+'</span>'
      +'<span style="color:var(--ink3);font-size:13px">HT &rarr; TVA&nbsp;'+fmt(Math.round(emolInfoHT*0.20*100)/100)+'&nbsp;&rarr; TTC&nbsp;'
      +fmt(Math.round(emolInfoHT*1.20*100)/100)+'</span>'
      +'</div>'
      +'<input type="hidden" id="txem-ht-val" value="'+emolInfoHT+'">';
  }

  emolHtml += '<div class="ibox ib-amber" style="margin-top:8px;font-size:11px">&#128204; Ces émoluments sont saisis dans le <strong>module TAXE d\'Inot Compta</strong> — Inot génère automatiquement les écritures 706100 + 44571000.</div>'
    +'</div></div>';

  zone.innerHTML = emolHtml + formalitesHtml + droitsHtml;
};

/* ── Calcul en temps réel de l\'émolument proportionnel ── */
const calcEmolLive = () => {
  const sel   = document.getElementById('tarif-acte-sel');
  const base  = parseFloat(document.getElementById('txem-base')?.value)||0;
  const res   = document.getElementById('txem-result');
  const htV   = document.getElementById('txem-ht-val');
  if(!sel) return;
  const idx   = parseInt(sel.value);
  if(isNaN(idx)||idx<0||idx>=ACTES_TAXE.length) return;
  const acte  = ACTES_TAXE[idx];
  if(acte.propIdx===undefined||!res) return;
  const p     = TARIF_PROP[acte.propIdx];
  if(base<=0){ res.style.display='none'; if(htV) htV.value=''; return; }
  const htBrut = calcProp(base, p.t);
  // Ecretement art. R444-9 : max 10% valeur, plancher 90 EUR
  const plaf10 = Math.round(base*0.10*100)/100;
  const ht     = Math.max(90, Math.min(htBrut, plaf10));
  const ecrete = htBrut > plaf10 && base > 900;
  const tva    = Math.round(ht*0.20*100)/100;
  const ttc    = Math.round((ht+tva)*100)/100;
  res.style.display='block';
  var ecEl=document.getElementById('txem-ecrete'); if(ecEl) ecEl.style.display=ecrete?'block':'none';
  const htEl  = document.getElementById('txem-ht');  if(htEl)  htEl.textContent =fmt(ht);

const _buildTaxeResult = (isProvision) => {
  const selActe = document.getElementById('tarif-acte-sel');
  if(!selActe||selActe.value==='') { toast('Sélectionner un acte','⚠️'); return null; }
  const idx   = parseInt(selActe.value);
  const acte  = ACTES_TAXE[idx];
  const txRef = document.getElementById('tarif-tx-ref')?.value?.trim()||'';
  const txDate= document.getElementById('tarif-tx-date')?.value||today();
  const txNom = document.getElementById('tarif-tx-nom')?.value?.trim()||'Client';
  const txCpt = document.getElementById('tarif-tx-cpt')?.value?.trim()||'';
  const credit= txNom+(txCpt?' — cpt '+txCpt:'');
  const rows  = [];
  const checks= [];

  // ─ Emolument principal
  const emolHtVal = parseFloat(document.getElementById('txem-ht-val')?.value)||0;
  if(emolHtVal<=0){ toast('Saisir la valeur de l\'acte','⚠️'); return null; }
  const emolLabel = acte.propIdx!==undefined
    ? 'N°'+TARIF_PROP[acte.propIdx].n+' — '+TARIF_PROP[acte.propIdx].label
    : 'N°'+TARIF_FIXES[acte.fixeIdx].n+' — '+TARIF_FIXES[acte.fixeIdx].label;
  const emolHT  = Math.round(emolHtVal*100)/100;
  const emolTVA = Math.round(emolHT*0.20*100)/100;
  rows.push({journal:'TAXE',date:txDate,debit:'706100 (Emoluments tarifies)',credit:credit,montant:String(emolHT), libelle:emolLabel});
  rows.push({journal:'TAXE',date:txDate,debit:'44571000 (TVA 20%)',         credit:credit,montant:String(emolTVA),libelle:'TVA 20% — '+emolLabel});
  checks.push('✅ Emolument '+emolLabel+' : '+fmt(emolHT)+' HT / '+fmt(emolTVA)+' TVA');

  // ─ Formalités cochées
  var formalitesTotal = 0;
  if(acte.formDef){
    acte.formDef.forEach(function(fi){
      if(fi>=TARIF_FORMALITES.length) return;
      var onEl = document.getElementById('txfm-'+fi+'-on');
      if(!onEl||!onEl.checked) return;
      var nb  = Math.max(1, parseInt(document.getElementById('txfm-'+fi+'-nb')?.value)||1);
      var fm  = TARIF_FORMALITES[fi];
      var htT = Math.round(fm.mt*nb*100)/100;
      var tvaT= Math.round(htT*0.20*100)/100;
      formalitesTotal += htT;
      rows.push({journal:'TAXE',date:txDate,debit:'706100 (Formalites)',credit:credit,montant:String(htT),libelle:'Formte n°'+fm.n+' — '+fm.label+(nb>1?' x'+nb:'')});
      rows.push({journal:'TAXE',date:txDate,debit:'44571000 (TVA 20%)',  credit:credit,montant:String(tvaT),libelle:'TVA 20% — n°'+fm.n});
      checks.push('✅ Formalité n°'+fm.n+' ('+fm.label+(nb>1?' x'+nb:'')+') : '+fmt(htT)+' HT');
    });
  }

  // ─ Droits & taxes
  var droitsMt = parseFloat(document.getElementById('txdr-droits')?.value)||0;
  var csiMt    = parseFloat(document.getElementById('txdr-csi')?.value)||0;
  var partageMt= parseFloat(document.getElementById('txdr-partage')?.value)||0;
  var deboursOt= parseFloat(document.getElementById('txdr-debours')?.value)||0;
  var droitsLib= ENREG_LABELS[acte.enreg]||'Droits';

  if(droitsMt>0){
    rows.push({journal:'TAXE',date:txDate,debit:'442000 (Droits Tresor)',credit:credit,montant:String(droitsMt),libelle:droitsLib});
    checks.push('✅ '+droitsLib+' : '+fmt(droitsMt));
  }
  if(csiMt>0){
    rows.push({journal:'OD',date:txDate,debit:'442000 (CSI Tresor)',credit:credit,montant:String(csiMt),libelle:'Contribution de securite immobiliere (CSI)'});
    checks.push('✅ CSI : '+fmt(csiMt));
  }
  if(partageMt>0){
    rows.push({journal:'TAXE',date:txDate,debit:'442000 (Droit partage)',credit:credit,montant:String(partageMt),libelle:'Droit de partage 1,10 %'});
    checks.push('✅ Droit de partage 1,10% : '+fmt(partageMt));
  }
  if(deboursOt>0){
    rows.push({journal:'OD',date:txDate,debit:'467100 (Debours)',credit:credit,montant:String(deboursOt),libelle:'Debours et avances divers'});
    checks.push('✅ Débours : '+fmt(deboursOt));
  }

  // ─ Totaux
  var totalEmolHT  = Math.round((emolHT+formalitesTotal)*100)/100;
  var totalEmolTVA = Math.round(totalEmolHT*0.20*100)/100;
  var totalTresor  = Math.round((droitsMt+csiMt+partageMt)*100)/100;
  var totalTTC     = Math.round((totalEmolHT+totalEmolTVA+totalTresor+deboursOt)*100)/100;

  checks.push('');
  checks.push('📊 Total émoluments HT : '+fmt(totalEmolHT));
  checks.push('📊 TVA 20% : '+fmt(totalEmolTVA));
  checks.push('📊 Droits & taxes Trésor : '+fmt(totalTresor));
  checks.push('📊 Débours : '+fmt(deboursOt));
  checks.push('📊 TOTAL TTC : '+fmt(totalTTC));
  checks.push('⚠️ Saisir les émoluments dans le module TAXE d\'Inot Compta');
  checks.push('📋 Conservation légale : 10 ans minimum (100 ans pour les actes authentiques)');

  const titre = isProvision
    ? '📋 PROVISION SUR FRAIS — '+txNom
    : '📋 NOTE DE FRAIS — '+txNom;

  return {
    ref:   txRef||(isProvision?'Provision':'Note de frais')+' '+txDate,
    nom:   txNom,
    isTaxe: true,
    totalTTC: totalTTC,
    docType: isProvision ? 'provision' : 'note',
    ecritures:[{titre:titre,
      description:'Taxation '+(isProvision?'(provision)':'(définitive)')+' — '+esc(acte.label)+' — Arrêté 25/02/2026',
      rows:rows}],
    checks:checks.filter(function(c){return c!==undefined;})
  };
};

  'Ventes':      {ht:482.00},
  'Donations':   {ht:420.00},
  'Prêts':       {ht:395.00},

const calcSimulation = function() {
  var selActe=document.getElementById('sim-acte-sel');
  var valEl=document.getElementById('sim-val');
  var res=document.getElementById('sim-result');
  var dRow=document.getElementById('sim-droits-row');
  if(!selActe||!valEl||!res) return;
  var idx=parseInt(selActe.value), val=parseFloat(valEl.value)||0;
  if(isNaN(idx)||idx<0||val<=0){res.style.display='none';if(dRow)dRow.style.display='none';return;}
  var acte=ACTES_TAXE[idx]; if(!acte) return;
  if(dRow) dRow.style.display='block';
  // Emolument
  var emolHT=0, emolN='';
  if(acte.propIdx!==undefined&&TARIF_PROP[acte.propIdx]){
    var p=TARIF_PROP[acte.propIdx]; emolHT=calcProp(val,p.t); emolN='N\u00b0'+p.n+' '+p.label;
  } else if(acte.fixeIdx!==undefined&&TARIF_FIXES[acte.fixeIdx]){
    var f=TARIF_FIXES[acte.fixeIdx]; emolHT=f.mt; emolN='N\u00b0'+f.n+' '+f.label;
  }
  emolHT=Math.round(emolHT*100)/100;
  var emolTVA=Math.round(emolHT*0.20*100)/100;
  var emolTTC=Math.round((emolHT+emolTVA)*100)/100;
  // Formalites forfait
  var fc=(SIM_FORM_FORFAITS[acte.cat]||SIM_FORM_FORFAITS['default']);
  var formHT=acte.spf?fc.ht:Math.round(fc.ht*0.40*100)/100;
  var formTVA=Math.round(formHT*0.20*100)/100;
  var formTTC=Math.round((formHT+formTVA)*100)/100;
  // Droits
  var tauxMut=parseFloat(document.getElementById('sim-taux-sel')?.value)||0;
  var droitsMut=0, droitsLabel='';
  if(acte.spf&&tauxMut>0){droitsMut=Math.round(val*tauxMut/100*100)/100;droitsLabel='Droits mutations '+tauxMut.toFixed(2)+'%';}
  else if(acte.enreg==='f125'){droitsMut=125;droitsLabel='Enregistrement sur état 125 €';}
  else if(acte.enreg==='f25'){droitsMut=25;droitsLabel='Enregistrement sur état 25 €';}
  else if(acte.enreg==='part'){droitsMut=Math.round(val*0.011*100)/100;droitsLabel='Droit de partage 1,10%';}
  else if(acte.enreg==='dmtg'){droitsLabel='DMTG (variable selon lien) — à calculer';}
  else if(acte.enreg==='exo'){droitsLabel='Exonéré de droits';}
  // CSI
  var csiMt=0;
  if(acte.csi&&acte.spf) csiMt=Math.round((Math.max(15,Math.round(val*0.001*100)/100)+8)*100)/100;
  // Debours
  var debStd=parseFloat(document.getElementById('sim-debours-sel')?.value)||0;
  var debExtra=parseFloat(document.getElementById('sim-debours-extra')?.value)||0;
  var debTotal=debStd+debExtra;
  // Totaux
  // Ecretement : emoluments + formalites <= 10% valeur, plancher 75 EUR HT
  if(val>0 && emolHT+formHT > Math.round(val*0.10*100)/100 && Math.round(val*0.10*100)/100 >= 75){
    var plaf10=Math.round(val*0.10*100)/100;
    var ecretHT=Math.max(75, plaf10-formHT);
    emolHT=Math.round(ecretHT*100)/100;
    emolTVA=Math.round(emolHT*0.20*100)/100;
    emolTTC=Math.round((emolHT+emolTVA)*100)/100;
    lines+='<div style="font-size:10px;color:#8B1A1A;background:#FEF2F2;border-radius:4px;padding:4px 8px;margin-bottom:4px">'+'\u26a0\ufe0f Ecretement : emoluments ramen\u00e9s \u00e0 10% de la valeur ('+fmt(plaf10)+' HT max). Art. R444-9.'+'</div>';
  }
  var totalExact=emolTTC+formTTC+droitsMut+csiMt+debTotal;
  var totalArrondi=Math.ceil(totalExact/100)*100;
  // Affichage
  var mkLine=function(lbl,ttc,col){return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--paper3)"><span style="font-size:12px">'+esc(lbl)+'</span><span style="font-family:var(--ff-mono);font-size:12px;font-weight:700;color:'+(col||'var(--ink)')+'">'+fmt(ttc)+'</span></div>';};
  var lines='';
  lines+=mkLine('Émoluments HT+TVA ('+emolN+')',emolTTC,'#7A1F1F');
  lines+=mkLine('Formalités forfait '+acte.cat+' HT+TVA',formTTC,'#1A2744');
  if(droitsMut>0) lines+=mkLine(droitsLabel,droitsMut,'#1A3B8B');
  else if(droitsLabel) lines+='<div style="font-size:11px;color:var(--ink4);padding:5px 0;border-bottom:1px solid var(--paper3)">'+esc(droitsLabel)+'</div>';
  if(csiMt>0) lines+=mkLine('CSI (0,10% valeur + forfait 8€)',csiMt,'#1A3B8B');
  if(debTotal>0) lines+=mkLine('Débours (standards + suppl.)',debTotal,'#2D6A4F');
  var lEl=document.getElementById('sim-lines'); if(lEl) lEl.innerHTML=lines;
  var teEl=document.getElementById('sim-total-exact'); if(teEl) teEl.textContent=fmt(totalExact);
  var taEl=document.getElementById('sim-total-arrondi'); if(taEl) taEl.textContent=fmt(totalArrondi);
  res.style.display='block';
  window._simData={acte,val,emolHT,emolTVC:emolTVA,emolTTC,formHT,formTTC,droitsMut,droitsLabel,csiMt,debTotal,totalExact,totalArrondi,emolN};
};

  if(a==='dashActeType'){
    const i=parseInt(el.dataset.i);

});
